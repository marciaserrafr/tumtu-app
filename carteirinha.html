<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu" style="background:#12101a;">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha — TumTu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css?v=4">
    <link rel="stylesheet" href="styles/components.css?v=7">
    <link rel="stylesheet" href="styles/carteirinha-tumtu-novo.css?v=18">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <style>
        /* Desliga a transição suave nativa entre páginas (ligada globalmente
           em styles/tokens.css) só nesta tela. Ela tenta fazer um cross-fade
           entre a página antiga (login) e esta, mas como o cartão começa
           invisível de propósito (opacity:0 até a cor real carregar, ver
           .carteirinha-zoom em carteirinha-tumtu-novo.css), o resultado era
           uma mistura feia — tela de login "fantasma" por cima do fundo
           escuro por um tempo (reportado pela Márcia em 15/jul/2026, visível
           num vídeo de tela real). Sem a transição, a troca é instantânea,
           e o cartão só aparece quando estiver pronto, sem mistura visual. */
        @view-transition { navigation: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        button { font-family: inherit; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cor-fundo-escuro);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 20px 12px;
        }
        /* Sem position:fixed de propósito (era assim antes) — num monitor
           de computador com a janela mais baixa que o conteúdo, o cabeçalho
           ficava "grudado" no topo da tela enquanto o cartão rolava pra
           baixo por baixo dele, como se fossem duas coisas separadas
           (reportado pela Márcia em 15/jul/2026, com print de computador).
           Agora ele rola junto com o resto — sobe e desce como parte da
           mesma página, não como barra fixa do site. */
        .topo {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 10px 20px;
            z-index: 10;
        }
        /* Alinhado com a mesma largura do cartão/botões (--largura-cartao,
           calculada em ajustarZoomCarteirinha) — antes o topo espalhava até
           a borda da tela enquanto o cartão ficava mais estreito e
           centralizado, dando a impressão de estar "desproporcional"
           (pedido da Márcia em 14/jul/2026). */
        .topo-conteudo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: var(--largura-cartao, 300px);
        }
        .topo-nome {
            font-size: 15px;
            color: #f4f2f7;
        }
        .topo-acoes {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .btn-sair {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.3);
            color: #D4AF37;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .btn-sair:hover { background: rgba(212,175,55,0.08); }
        /* Antes tinha margin-top:44px pra escapar do cabeçalho fixo — agora
           quem faz essa folga é o padding-top do body (topo colado no
           cartão, sobra de espaço só embaixo, pedido da Márcia em
           14/jul/2026). */
        .carteirinha-scene { margin-top: 0; }
        .c-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #1e1b2e; color: white; padding: 12px 20px; border-radius: 12px;
            font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 9999; display: none; border-left: 4px solid #D4AF37; max-width: 90vw;
        }
        .c-toast.erro { border-left-color: #ef4444; }
        .c-toast.visivel { display: block; }

        /* Carregando de verdade — cobre a tela inteira até a carteirinha estar
           100% pronta (nome/cargo + foto decodificada + cor da escola aplicada),
           pra nunca aparecer nada pela metade (pedido explícito da Márcia,
           17/jul/2026 — ela não quer nenhum "estalo" de foto/cor depois do
           cartão já estar visível). Troca instantânea pro cartão quando pronto,
           sem fade (ela também já tinha rejeitado fade/espera lenta em 15/jul).
           Visual: spinner dourado sozinho e maior, sem logo nem texto — mesma
           decisão final de login.html (referência Disney+/Netflix; passou por
           logo+spinner+texto e por uma animação dos círculos da marca antes
           de chegar aqui). */
        #carregandoCarteirinha {
            position: fixed; inset: 0; z-index: 999; background: #12101a;
            display: flex; align-items: center; justify-content: center;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(212,175,55,0.15);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: tt-girar 0.8s linear infinite;
            filter: drop-shadow(0 0 6px rgba(212,175,55,0.55));
        }
        @keyframes tt-girar { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation-duration: 1.6s; }
        }
    </style>
</head>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    // Fica só declarado aqui — as duas bibliotecas de fora (Supabase e QR
    // code) agora carregam com "defer" (não travam mais o resto da página
    // enquanto baixam, resolve a tela preta demorada reportada pela Márcia
    // em 15/jul/2026). Isso significa que "window.supabase" só existe
    // depois do DOMContentLoaded — por isso a criação de verdade do
    // cliente (sb = ...) e todo código que depende dele ficam dentro do
    // listener de DOMContentLoaded lá embaixo, não aqui no topo.
    let sb;

    function mostrarToast(msg, tipo = 'ok') {
        const t = document.getElementById('cToast');
        t.textContent = msg;
        t.className = 'c-toast visivel ' + tipo;
        setTimeout(() => { t.className = 'c-toast'; }, 3500);
    }

    function esconderCarregandoCarteirinha() {
        const el = document.getElementById('carregandoCarteirinha');
        if (el) el.style.display = 'none';
    }

    async function renderCarteirinha(ritmista) {
        // Label de cargo — gênero só muda Mestre/Diretor (Mestra/Diretora); sem
        // gênero informado cai no masculino como padrão neutro. Ritmista nunca varia.
        const perfil = ritmista.perfil || 'ritmista';
        const feminino = ritmista.genero === 'feminino';
        const labelCargo = perfil === 'mestre' ? (feminino ? 'Mestra de Bateria' : 'Mestre de Bateria')
            : perfil === 'diretor' ? (feminino ? 'Diretora' : 'Diretor')
            : 'Ritmista';
        document.getElementById('cRole').textContent = labelCargo;

        document.getElementById('nomeRitmista').textContent = ritmista.nome;

        if (ritmista.apelido) {
            document.getElementById('apelidoRitmista').textContent = '"' + ritmista.apelido + '"';
        }

        // Mestre/Diretor não têm instrumento — a linha some por completo em vez
        // de ficar vazia, pra não desalinhar o bloco central (que é centralizado).
        const instEl = document.getElementById('instrumentoRitmista');
        if (perfil === 'ritmista' && ritmista.instrumento_nome) {
            instEl.textContent = ritmista.instrumento_nome;
            instEl.style.display = '';
        } else {
            instEl.style.display = 'none';
        }

        document.getElementById('cpfRitmista').textContent = ritmista.cpf || '—';

        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
            // Espera a foto estar de verdade pronta pra desenhar antes de
            // considerar a carteirinha "pronta" — é isso que "estalava" depois
            // do resto do cartão já estar na tela (reportado no desktop,
            // 17/jul/2026). Nunca trava pra sempre: se decode() falhar (foto
            // corrompida etc.), segue em frente do mesmo jeito.
            try { await img.decode(); } catch (e) {}
        }

        document.getElementById('membroDesde').textContent = ritmista.membro_desde || '—';

        // QR code real apontando para a página de emergência
        const qrUrl = `${window.location.origin}/qr.html?id=${ritmista.id}`;
        new QRCode(document.getElementById('qrcode'), {
            text: qrUrl,
            width: 110,
            height: 110,
            colorDark: '#111111',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    // Busca nome/temporada/cores da escola e bateria no banco (substitui o
    // antigo config-escola.js estático — cada bateria mostra os dados certos).
    // Logo fica de fora de propósito: agora que o logo é um arquivo de
    // verdade (base64, pode passar de 200KB), embutir ele nessa mesma busca
    // atrasava a cor certa aparecer — a tela mostrava a cor padrão do TumTu
    // e só trocava pra cor da escola quando o logo pesado terminasse de
    // chegar, um "flash" feio (reportado pela Márcia em 15/jul/2026). Agora
    // cor/texto (leves) chegam e aparecem imediatos; o logo é buscado à
    // parte por carregarLogosEscola() e só entra quando estiver pronto,
    // como qualquer imagem de página carregando aos poucos.
    async function carregarConfigEscola(bateriaId, token) {
        const cfgVazio = { nomeEscola: '', nomeBateria: '', instagramBateria: '', temporadaAtual: '', cores: [], escolaId: null };
        if (!bateriaId) return cfgVazio;
        try {
            const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` };

            const resBateria = await fetch(`${SUPABASE_URL}/rest/v1/baterias?id=eq.${bateriaId}&select=nome,instagram,escola_id`, { headers: hdrs });
            const baterias = await resBateria.json();
            const bateria = Array.isArray(baterias) && baterias[0] ? baterias[0] : null;
            if (!bateria) return cfgVazio;

            let escola = null;
            if (bateria.escola_id) {
                const resEscola = await fetch(`${SUPABASE_URL}/rest/v1/escolas?id=eq.${bateria.escola_id}&select=nome,temporada_atual,cor_primaria,cor_secundaria,cor_terciaria,cor_quaternaria`, { headers: hdrs });
                const escolas = await resEscola.json();
                escola = Array.isArray(escolas) && escolas[0] ? escolas[0] : null;
            }

            return {
                nomeEscola: escola ? (escola.nome || '') : '',
                nomeBateria: bateria.nome || '',
                instagramBateria: bateria.instagram || '',
                temporadaAtual: (escola && escola.temporada_atual) || '',
                cores: escola ? [escola.cor_primaria, escola.cor_secundaria, escola.cor_terciaria, escola.cor_quaternaria].filter(Boolean) : [],
                corPrimaria: escola ? escola.cor_primaria || null : null,
                corSecundaria: escola ? escola.cor_secundaria || null : null,
                corTerciaria: escola ? escola.cor_terciaria || null : null,
                escolaId: bateria.escola_id || null,
            };
        } catch (e) {
            return cfgVazio;
        }
    }

    function aplicarConfigEscola(cfg) {
        document.getElementById('c-escola-nome').textContent = cfg.nomeEscola || 'TumTu';
        document.getElementById('c-bateria-nome').textContent = cfg.nomeBateria || 'Time TumTu';
        document.getElementById('c-verso-titulo').textContent = cfg.nomeBateria || 'Time TumTu';
        document.getElementById('c-verso-sub').textContent = cfg.nomeEscola || 'TumTu';
        document.getElementById('c-temporada-valor').textContent = cfg.temporadaAtual || 'Carnaval 2027';

        const igEl = document.getElementById('c-rodape-instagram');
        igEl.textContent = cfg.instagramBateria
            ? (cfg.instagramBateria.startsWith('@') ? cfg.instagramBateria : '@' + cfg.instagramBateria)
            : '@tumtu.app';

        // Cores injetadas no ancestral comum de frente e verso — herdam por CSS custom properties.
        const inner = document.getElementById('carteirinhaInner');
        (cfg.cores || []).forEach((cor, i) => inner.style.setProperty(`--cor-${i + 1}`, cor));

        // Cor do anel da foto: pula qualquer cor branca (fica sem graça em
        // cima do fundo branco do cartão) — prioridade terciária > secundária
        // > primária, pedido da Márcia em 16/jul/2026 depois de notar que a
        // "cor 2" de várias escolas é branco. Sem nenhuma cor não-branca
        // disponível, volta pro cinza neutro (--cor-anel-gradiente já cai lá
        // sozinho quando --cor-anel-base não é setada).
        const corAnel = escolherCorAnel(cfg.corTerciaria, cfg.corSecundaria, cfg.corPrimaria);
        if (corAnel) inner.style.setProperty('--cor-anel-base', corAnel);
        else inner.style.removeProperty('--cor-anel-base');

        // Verso e rodapé da frente têm fundo que muda de cor por escola
        // (--cor-primaria) — textos com transparência fixa (branco 35-45%)
        // ficavam ilegíveis em escolas de cor clara, quase invisíveis em
        // algumas (medido: chega a 1.0:1 de contraste, quando o mínimo
        // legível é 4.5:1). Calcula se a cor de fundo é clara ou escura e
        // ajusta rótulos/valores pra sempre ter contraste real, não só nas
        // escolas de cor escura (achado da Márcia, 16/jul/2026).
        const corFundoDinamico = cfg.corPrimaria || (cfg.cores && cfg.cores[0]) || '#706c87';
        const escuro = !corEhClara(corFundoDinamico);
        inner.style.setProperty('--cor-rotulo-dinamico', escuro ? 'rgba(255,255,255,0.75)' : 'rgba(18,16,26,0.68)');
        inner.style.setProperty('--cor-forte-dinamico', escuro ? '#ffffff' : '#12101a');
        // Dourado só sobrevive em fundo escuro — em escola de cor clara,
        // dourado-sobre-dourado nunca dá contraste real (são a mesma
        // família de matiz), então cai pro mesmo escuro sólido do resto do
        // texto forte em vez de tentar salvar o tom dourado.
        inner.style.setProperty('--cor-valor-dinamico', escuro ? '#D4AF37' : '#12101a');
    }

    // Considera "branca" qualquer tom bem próximo do branco puro — não só
    // #ffffff exato, porque uma escola pode ter cadastrado um branco
    // levemente off (#fefefe, #fdfdfd etc.) que teria o mesmo problema visual.
    function corEhBranca(hex) {
        if (!hex) return true;
        const h = hex.replace('#', '');
        const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
        if (full.length !== 6) return false;
        const r = parseInt(full.slice(0, 2), 16);
        const g = parseInt(full.slice(2, 4), 16);
        const b = parseInt(full.slice(4, 6), 16);
        return r > 240 && g > 240 && b > 240;
    }

    // Luminância relativa oficial (fórmula WCAG) — usada pra decidir se um
    // fundo dinâmico (cor da escola) é claro ou escuro o suficiente pra
    // precisar de texto escuro em vez de branco por cima. Mesmo critério
    // usado no cálculo de contraste (16/jul/2026).
    function corEhClara(hex) {
        if (!hex) return false;
        const h = hex.replace('#', '');
        const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
        if (full.length !== 6) return false;
        const canal = v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); };
        const r = canal(parseInt(full.slice(0, 2), 16));
        const g = canal(parseInt(full.slice(2, 4), 16));
        const b = canal(parseInt(full.slice(4, 6), 16));
        const luminancia = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        return luminancia > 0.42; // ponto de corte prático: acima disso, texto branco começa a perder contraste real
    }

    function escolherCorAnel(...candidatas) {
        for (const cor of candidatas) {
            if (cor && !corEhBranca(cor)) return cor;
        }
        return null;
    }

    // Busca só os logos (escola + bateria) — separado de carregarConfigEscola
    // pra não atrasar a cor/texto, que precisam aparecer na hora.
    async function carregarLogosEscola(bateriaId, escolaId, token) {
        try {
            const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` };
            const [resBateria, resEscola] = await Promise.all([
                fetch(`${SUPABASE_URL}/rest/v1/baterias?id=eq.${bateriaId}&select=logo_url`, { headers: hdrs }),
                escolaId
                    ? fetch(`${SUPABASE_URL}/rest/v1/escolas?id=eq.${escolaId}&select=logo_url`, { headers: hdrs })
                    : Promise.resolve(null),
            ]);
            const baterias = await resBateria.json();
            const escolas = resEscola ? await resEscola.json() : [];
            return {
                logoBateria: (Array.isArray(baterias) && baterias[0] && baterias[0].logo_url) || null,
                logoEscola: (Array.isArray(escolas) && escolas[0] && escolas[0].logo_url) || null,
            };
        } catch (e) {
            return { logoBateria: null, logoEscola: null };
        }
    }

    // Guarda cor/logo da última vez em localStorage — na próxima abertura,
    // aplica isso ANTES de qualquer busca de rede, sem espera nenhuma. Só o
    // primeiro acesso de todos (aparelho novo, sem nada salvo ainda) depende
    // de rede antes da cor aparecer; depois disso, é sempre instantâneo.
    function chaveCacheConfig(bateriaId) {
        return `tumtu_cfg_${bateriaId}`;
    }

    function lerConfigCache(bateriaId) {
        try {
            const raw = localStorage.getItem(chaveCacheConfig(bateriaId));
            return raw ? JSON.parse(raw) : null;
        } catch (e) {
            return null;
        }
    }

    function salvarConfigCache(bateriaId, cfg, logos) {
        // Nunca guarda um resultado vazio/falho (ex: sessão sem token válido,
        // erro de rede) — isso "travaria" o cache num estado errado pra
        // sempre. Só grava quando a busca realmente encontrou uma escola.
        if (!cfg || !cfg.escolaId) return;
        try {
            localStorage.setItem(chaveCacheConfig(bateriaId), JSON.stringify(Object.assign({}, cfg, logos)));
        } catch (e) {
            // localStorage cheio/indisponível — sem cache não quebra nada, só perde a instantaneidade
        }
    }

    function aplicarLogosEscola(logos) {
        const logoFrente = document.getElementById('logoEscolaFrente');
        if (logos.logoEscola) { logoFrente.src = logos.logoEscola; logoFrente.style.display = 'block'; }
        else logoFrente.style.display = 'none';

        // Logo do verso: prioriza a logo da bateria; se não houver, cai pra logo da escola.
        const logoVerso = document.getElementById('logoEscolaVerso');
        const urlLogoVerso = logos.logoBateria || logos.logoEscola;
        if (urlLogoVerso) { logoVerso.src = urlLogoVerso; logoVerso.style.display = 'block'; }
        else logoVerso.style.display = 'none';
    }

    async function renderMestres(bateriaId) {
        if (!bateriaId) return;
        try {
            const res = await fetch(
                `${SUPABASE_URL}/rest/v1/mestres_publicos?bateria_id=eq.${bateriaId}&select=nome,apelido,genero&order=nome.asc`,
                { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
            );
            const mestres = await res.json();
            if (!Array.isArray(mestres) || mestres.length === 0) return;

            const bloco = document.getElementById('c-mestre-bloco');
            const container = document.getElementById('c-mestre-nomes');
            const label = document.getElementById('c-mestre-label');

            // "Mestres" no plural já é neutro em português — só o singular varia (Mestre/Mestra).
            label.textContent = mestres.length > 1 ? 'Mestres de Bateria'
                : mestres[0].genero === 'feminino' ? 'Mestra de Bateria'
                : 'Mestre de Bateria';

            // Nome exibido: apelido se tiver, senão o nome completo — nunca prefixado com "Mestre".
            container.innerHTML = mestres.map((m, i) => {
                const nomeExibido = m.apelido || m.nome;
                const sep = i > 0 ? '<div class="v-mestre__sep"></div>' : '';
                return sep + `<div class="v-mestre__nome">${nomeExibido}</div>`;
            }).join('');

            bloco.style.display = 'block';
        } catch (e) {
            // Silencioso — carteirinha continua funcional sem o bloco de mestre
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');

    if (idParam) {
        // Modo admin: botão "Sair" não deve limpar a sessão do admin logado
        const btnSair = document.getElementById('btnSairTopo');
        btnSair.textContent = 'Fechar';
        btnSair.onclick = () => window.close();

        // Modo admin: busca ritmista pelo id na URL
        (async () => {
            const { data: sessionData } = await sb.auth.getSession();
            const token = sessionData.session ? sessionData.session.access_token : SUPABASE_KEY;
            fetch(`${SUPABASE_URL}/rest/v1/ritmistas_com_instrumento?id=eq.${idParam}&select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(async rows => {
                if (!rows || rows.length === 0) {
                    mostrarToast('Ritmista não encontrado.', 'erro');
                    setTimeout(() => history.back(), 1200);
                    return;
                }
                const ritmista = rows[0];
                await renderCarteirinha(ritmista);
                renderMestres(ritmista.bateria_id);
                const cacheado = lerConfigCache(ritmista.bateria_id);
                if (cacheado) { aplicarConfigEscola(cacheado); aplicarLogosEscola(cacheado); }
                const cfg = await carregarConfigEscola(ritmista.bateria_id, token);
                aplicarConfigEscola(cfg);
                esconderCarregandoCarteirinha();
                carregarLogosEscola(ritmista.bateria_id, cfg.escolaId, token).then(logos => {
                    aplicarLogosEscola(logos);
                    salvarConfigCache(ritmista.bateria_id, cfg, logos);
                });
            })
            .catch(() => { mostrarToast('Erro ao carregar carteirinha.', 'erro'); setTimeout(() => history.back(), 1200); });
        })();
    } else {
        // Modo normal: usa localStorage
        const ritmista = JSON.parse(localStorage.getItem('ritmista'));
        if (!ritmista) {
            window.location.href = 'login.html';
        } else {
            renderMestres(ritmista.bateria_id);
            document.getElementById('btnMeuPerfilRodape').style.display = 'block';
            // "Trocar de Bateria" só aparece pra quem tem 2+ vínculos (totalVinculos
            // vem calculado no login.html, na hora de escolher/entrar direto).
            // Sem ele, "Meu Perfil" fica sozinho e centralizado (classe
            // botoes-solo), em vez de esticar de ponta a ponta.
            if (ritmista.totalVinculos > 1) {
                document.getElementById('btnTrocarBateria').style.display = 'block';
            } else {
                document.querySelector('.c-botoes').classList.add('botoes-solo');
            }
            const cacheado = lerConfigCache(ritmista.bateria_id);
            (async () => {
                await renderCarteirinha(ritmista);
                const { data: sessionData } = await sb.auth.getSession();
                const token = sessionData.session ? sessionData.session.access_token : SUPABASE_KEY;
                if (cacheado) {
                    // Cor/logo já conhecidos de antes — carteirinha já pode
                    // aparecer (a foto, esperada acima, era o único pedaço que
                    // ainda faltava). Atualiza o cache por trás, sem segurar a tela.
                    aplicarConfigEscola(cacheado);
                    aplicarLogosEscola(cacheado);
                    esconderCarregandoCarteirinha();
                    const cfg = await carregarConfigEscola(ritmista.bateria_id, token);
                    aplicarConfigEscola(cfg);
                    carregarLogosEscola(ritmista.bateria_id, cfg.escolaId, token).then(logos => {
                        aplicarLogosEscola(logos);
                        salvarConfigCache(ritmista.bateria_id, cfg, logos);
                    });
                } else {
                    // Primeiro acesso nesse aparelho — precisa mesmo buscar a
                    // cor da escola antes de mostrar (senão volta o "flash"
                    // já resolvido antes, 15/jul/2026).
                    const cfg = await carregarConfigEscola(ritmista.bateria_id, token);
                    aplicarConfigEscola(cfg);
                    esconderCarregandoCarteirinha();
                    carregarLogosEscola(ritmista.bateria_id, cfg.escolaId, token).then(logos => {
                        aplicarLogosEscola(logos);
                        salvarConfigCache(ritmista.bateria_id, cfg, logos);
                    });
                }
            })();
        }
    }
    }); // fecha o DOMContentLoaded

    async function abrirPerfil() {
        const u = JSON.parse(localStorage.getItem('ritmista') || 'null');
        if (!u) return;
        await fpMontar(document.getElementById('fp-container-perfil'));
        fpIniciar(u, u.perfil, u.pessoa_id, {
            aoSalvar: (novosDados) => {
                document.getElementById('apelidoRitmista').textContent = novosDados.apelido ? '"' + novosDados.apelido + '"' : '';
                if (novosDados.foto_url) {
                    const img = document.createElement('img');
                    img.src = novosDados.foto_url;
                    const box = document.getElementById('fotoRitmista');
                    box.innerHTML = '';
                    box.appendChild(img);
                }
            }
        });
        // "Fechar" entra na mesma fileira de Editar/Salvar/Cancelar (hook
        // #fp-acoes-extra, já existente na partial pra esse fim) — antes
        // ficava numa div separada embaixo, o que a Márcia notou como
        // "desalinhado" (16/jul/2026).
        const acoesExtra = document.getElementById('fp-acoes-extra');
        if (acoesExtra) acoesExtra.innerHTML = '<button class="btn-ficha" onclick="fecharPerfil()">Fechar</button>';
        document.getElementById('modalPerfilOverlay').style.display = 'flex';
    }

    function fecharPerfil() {
        document.getElementById('modalPerfilOverlay').style.display = 'none';
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaInner').classList.toggle('virada');
    }

    // Tamanho responsivo do cartão (14/jul/2026): o "documento" original
    // continua 300×540 (regra da Márcia, nunca mexer nesse valor base), mas
    // na tela ele cresce via zoom (transform: scale, mantém toda a
    // proporção interna) pra preencher melhor telas de celular mais altas,
    // sem sobrar tanto espaço vazio em cima/embaixo do cartão. Nunca fica
    // menor que o tamanho original (300×540 é sempre o piso).
    // A largura calculada (--largura-cartao) também é usada pelo topo
    // (.topo-conteudo) e pelos botões de baixo (.c-botoes), pra tudo ficar
    // alinhado na mesma coluna — por isso é aplicada no <html>, não só no
    // cartão.
    function ajustarZoomCarteirinha() {
        const zoom = document.getElementById('carteirinhaZoom');
        if (!zoom) return;

        const LARGURA_BASE = 300;
        const ALTURA_BASE = 540;
        const RESERVA_VERTICAL = 160; // header + dica + botões + respiros, fora do cartão

        const larguraMax = Math.min(window.innerWidth * 0.92, 400);
        const alturaDisponivel = window.innerHeight - RESERVA_VERTICAL;
        const larguraPorAltura = alturaDisponivel * (LARGURA_BASE / ALTURA_BASE);

        const largura = Math.max(LARGURA_BASE, Math.min(larguraMax, larguraPorAltura));
        const fator = largura / LARGURA_BASE;

        document.documentElement.style.setProperty('--largura-cartao', largura + 'px');
        zoom.style.setProperty('--fator-zoom-carteirinha', fator);
    }
    window.addEventListener('resize', ajustarZoomCarteirinha);
    ajustarZoomCarteirinha();

    async function sair() {
        await sb.auth.signOut();
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    // Reaproveita a sessão já aberta (sem pedir senha de novo) — login.html
    // busca todos os vínculos e mostra a telinha de escolher, mesmo já logado.
    function trocarBateria() {
        window.location.href = 'login.html?trocar=1';
    }
</script>
