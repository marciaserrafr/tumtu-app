<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha - Swing da Leopoldina</title>
    <style>
        :root {
            --preto: #111111;
            --verde-imperial: #0B5D3B;
            --verde-escuro: #063A24;
            --dourado: #C9A227;
            --dourado-claro: #E3C96B;
            --branco: #FFFFFF;
            --cinza: #E8E8E8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #111a14 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            flex-direction: column;
        }

        .topo {
            width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .topo-nome { font-size: 11px; color: var(--dourado); letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        .btn-sair {
            background: transparent;
            border: 1px solid rgba(201,162,39,0.3);
            color: var(--dourado);
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* FLIP */
        .carteirinha-wrapper { width: 320px; height: 540px; perspective: 1400px; }
        .carteirinha-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 1s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .carteirinha-wrapper.virada .carteirinha-inner { transform: rotateY(180deg); }

        .frente, .verso {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 24px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,162,39,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .verso { transform: rotateY(180deg); }

        /* ══ FRENTE ══ */
        .frente { background: var(--preto); position: relative; }

        .frente-svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }

        .frente-corpo {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            padding: 26px 24px 24px;
        }

        /* Topo */
        .card-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-topo-info { flex: 1; }
        .card-escola {
            font-size: 7px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            white-space: nowrap;
        }
        .card-bateria {
            font-size: 17px;
            font-weight: 700;
            color: var(--dourado);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .status-badge {
            background: rgba(11,93,59,0.6);
            border: 1px solid rgba(201,162,39,0.4);
            border-radius: 20px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(4px);
            margin-left: 12px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
        }
        .status-txt { font-size: 8px; color: #4ade80; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

        /* Foto + dados lado a lado */
        .foto-area {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
        }
        .foto-anel {
            width: 108px; height: 108px;
            border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(135deg, #8B6914, #E3C96B, #C9A227, #8B6914);
            box-shadow: 0 0 20px rgba(201,162,39,0.3);
            flex-shrink: 0;
        }
        .foto-interno {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-size: 42px;
        }
        .foto-interno img { width: 100%; height: 100%; object-fit: cover; }

        .foto-dados { flex: 1; }
        .funcao-tag { font-size: 7px; color: var(--dourado); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .nome { font-size: 18px; font-weight: 700; color: var(--branco); line-height: 1.2; margin-bottom: 4px; }
        .instrumento { font-size: 12px; color: var(--dourado-claro); letter-spacing: 1px; opacity: 0.85; }
        .apelido { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-top: 3px; font-style: italic; }

        /* Linha dourada */
        .linha-dourada {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dourado), rgba(201,162,39,0.1));
            margin-bottom: 18px;
        }

        /* CPF */
        .cpf-area { margin-bottom: 18px; }
        .dado-label { font-size: 7px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
        .dado-valor { font-size: 12px; font-weight: 600; color: var(--cinza); letter-spacing: 1px; }

        /* Linha fina */
        .linha-fina { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 18px; }

        /* Rodapé */
        .card-rodape {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 16px;
        }
        .mestre-label { font-size: 7px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
        .mestre-nome { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; }
        .validade-area { text-align: right; }
        .validade-label { font-size: 7px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
        .validade-valor { font-size: 15px; font-weight: 700; color: var(--dourado); letter-spacing: 1px; }
        .carnaval-ano { font-size: 9px; color: rgba(201,162,39,0.45); letter-spacing: 2px; text-transform: uppercase; }

        /* Logo rodapé frente — estilo São Clemente */
        .logo-rodape {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .logo-rodape-circulo {
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 1.5px solid rgba(201,162,39,0.5);
            background: rgba(201,162,39,0.06);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-rodape-texto {
            font-size: 7px;
            color: rgba(201,162,39,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ══ VERSO ══ */
        .verso {
            background: linear-gradient(160deg, #0a0f0b 0%, #0d3a20 60%, #063A24 100%);
            position: relative;
        }

        .verso-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .verso-corpo {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 28px 24px;
        }

        .verso-topo {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .verso-bateria-nome { font-size: 14px; font-weight: 700; color: var(--dourado); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
        .verso-escola-nome { font-size: 7px; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

        .verso-logo {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(201,162,39,0.35);
            background: rgba(201,162,39,0.04);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* QR */
        .qr-area {
            width: 150px; height: 150px;
            background: var(--branco);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .qr-label { font-size: 7px; color: #555; letter-spacing: 1px; text-transform: uppercase; text-align: center; margin-top: 6px; }

        .verso-linha { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,162,39,0.3), transparent); margin-bottom: 18px; }

        .verso-rodape { width: 100%; display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .verso-link-item { font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 1px; margin-bottom: 4px; }
        .validacao-label { font-size: 7px; color: rgba(201,162,39,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
        .validacao-valor { font-size: 9px; color: rgba(255,255,255,0.2); text-align: right; }

        /* Ornamentos */
        .canto { position: absolute; width: 18px; height: 18px; border-color: rgba(201,162,39,0.25); border-style: solid; z-index: 2; }
        .canto-tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
        .canto-tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
        .canto-bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }
        .canto-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

        /* Botão virar — ABAIXO da carteirinha */
        .btn-virar-externo {
            margin-top: 14px;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(201,162,39,0.1);
            border: 1px solid rgba(201,162,39,0.35);
            color: var(--dourado);
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* Botões */
        .acoes { width: 320px; margin-top: 14px; display: flex; gap: 10px; }
        .btn-acao { flex: 1; padding: 13px; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
        .btn-salvar { background: transparent; border: 1px solid rgba(201,162,39,0.4); color: var(--dourado); }
        .btn-compartilhar { background: var(--verde-imperial); border: 1px solid rgba(201,162,39,0.3); color: var(--dourado); }
    </style>
</head>
<body>

<div class="topo">
    <span class="topo-nome">Swing da Leopoldina</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
</div>

        </div>

                    <div>
                        <div class="verso-link-item">📷 @swingdaleopoldina</div>

            </div>
        </div>

    </div>
</div>

<div class="acoes">
    <button class="btn-acao btn-salvar" onclick="salvarImagem()">Salvar</button>
    <button class="btn-acao btn-compartilhar" onclick="compartilhar()">Compartilhar</button>
</div>

<script>
    const ritmista = JSON.parse(localStorage.getItem('ritmista'));
    if (!ritmista) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('nomeRitmista').textContent = ritmista.nome;
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';
        if (ritmista.apelido) {
            document.getElementById('apelidoRitmista').textContent = '"' + ritmista.apelido + '"';
        }
        document.getElementById('cpfRitmista').textContent = ritmista.cpf || '—';
        document.getElementById('validadeCarteirinha').textContent = '31/07/2027';
        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaWrapper').classList.toggle('virada');
    }
    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }
    function salvarImagem() { alert('Função de salvar imagem será ativada em breve!'); }
    function compartilhar() {
        if (navigator.share && ritmista) {
            navigator.share({ title: 'Minha Carteirinha — Swing da Leopoldina', text: `${ritmista.nome} — Ritmista da Imperatriz Leopoldinense. Carnaval 2027!` });
        } else { alert('Compartilhamento não disponível neste dispositivo.'); }
    }
</script>
</body>
</html>
