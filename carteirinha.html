<!DOCTYPE html>
<html lang="pt-BR" data-tema="tutti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha — Tutti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="carteirinha-tutti.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="config-escola.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cor-fundo-escuro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }
        .topo {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            z-index: 10;
        }
        .topo-nome {
            font-size: 11px;
            color: #D4AF37;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .btn-sair {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.3);
            color: #D4AF37;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .btn-sair:hover { background: rgba(212,175,55,0.08); }
        .carteirinha-scene { margin-top: 40px; }
    </style>
</head>
<body>

<div class="topo">
    <span class="topo-nome">Tutti</span>
    <button class="btn-sair" id="btnSairTopo" onclick="sair()">Sair</button>
</div>

<div class="carteirinha-scene">

    <div class="c-hint">↺ toque para virar</div>

    <div class="carteirinha-wrap" onclick="virarCarteirinha()">
        <div class="carteirinha-inner" id="carteirinhaInner">

            <!-- ════ FRENTE ════ -->
            <div class="carteirinha-face">
                <div class="c-frente">
                    <div class="c-tri-esquerda-1"></div>
                    <div class="c-tri-esquerda-2"></div>
                    <div class="c-tri-direita-1"></div>
                    <div class="c-tri-direita-2"></div>
                    <div class="c-tri-topo"></div>

                    <div class="c-header">
                        <div>
                            <div class="c-escola" id="c-escola-nome"></div>
                            <div class="c-bateria" id="c-bateria-nome"></div>
                        </div>
                        <div class="c-status">
                            <div class="c-status-dot"></div>
                            Ativo
                        </div>
                    </div>

                    <div class="c-foto-area">
                        <div class="c-foto" id="fotoRitmista">
                            <div class="c-foto-anel"></div>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="8" r="4"/>
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                            </svg>
                        </div>
                        <div class="c-role" id="cRole">Ritmista</div>
                    </div>

                    <div class="c-identidade">
                        <div class="c-nome" id="nomeRitmista">—</div>
                        <div class="c-apelido" id="apelidoRitmista"></div>
                        <div class="c-instrumento" id="instrumentoRitmista">—</div>
                    </div>

                    <div class="c-divisor"></div>

                    <div class="c-cpf">
                        <div class="c-label">CPF</div>
                        <div class="c-valor" id="cpfRitmista">—</div>
                    </div>

                    <!-- Membro desde — canto inferior esquerdo -->
                    <div class="c-membro-desde" id="membroDesdeBox" style="display:none">
                        <div class="c-label">Membro desde</div>
                        <div class="c-valor" id="membroDesde">—</div>
                    </div>

                    <!-- Logo da escola — canto inferior direito -->
                    <div class="c-logo">
                        <div class="c-logo-circulo">
                            <img id="logoEscolaFrente" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ════ VERSO ════ -->
            <div class="carteirinha-face carteirinha-verso">
                <div class="c-verso-bg">
                    <div class="c-verso-tri-esquerda"></div>
                    <div class="c-verso-tri-direita"></div>

                    <div class="c-verso-header">
                        <div>
                            <div class="c-verso-titulo" id="c-verso-titulo">Tutti</div>
                            <div class="c-verso-sub" id="c-verso-sub">Gestão de Baterias</div>
                        </div>
                        <div class="c-logo-verso">
                            <img id="logoEscolaVerso" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
                        </div>
                    </div>

                    <div class="c-qr-area">
                        <div class="c-qr">
                            <div id="qrcode"></div>
                        </div>
                        <div class="c-qr-label">Validação Digital</div>
                    </div>

                    <div class="c-mestre" id="c-mestre-bloco" style="display:none">
                        <div class="c-mestre-label">Mestre de Bateria</div>
                        <div class="c-mestre-nome" id="c-mestre-nome"></div>
                    </div>

                    <!-- Válida até + Temporada — lado a lado com divisória vertical -->
                    <div class="c-validade-temporada">
                        <div class="c-validade">
                            <div class="c-label">Válida até</div>
                            <div class="c-validade-valor">31/07/2027</div>
                        </div>
                        <div class="c-divisor-vertical"></div>
                        <div class="c-temporada">
                            <div class="c-label">Temporada</div>
                            <div class="c-temporada-valor" id="c-temporada-valor">Carnaval 2027</div>
                        </div>
                    </div>

                    <div class="c-verso-rodape">
                        <div class="c-rodape-instagram" id="c-rodape-instagram"></div>
                        <div class="c-rodape-tutti">Tu<span class="destaque" style="font-weight:900">TT</span>i</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="c-botoes">
        <button class="c-btn-salvar" onclick="salvarImagem()">Salvar</button>
        <button class="c-btn-compartilhar" onclick="compartilhar()">Compartilhar</button>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';

    function renderCarteirinha(ritmista) {
        // Label de cargo
        const perfil = ritmista.perfil || 'ritmista';
        const labelCargo = perfil === 'mestre' ? 'Mestre de Bateria'
            : perfil === 'diretor' ? 'Diretor'
            : 'Ritmista';
        document.getElementById('cRole').textContent = labelCargo;

        // Nome
        const nomeEl = document.getElementById('nomeRitmista');
        nomeEl.textContent = ritmista.nome;
        const len = ritmista.nome.length;
        if (len > 30) nomeEl.style.fontSize = '13px';
        else if (len > 22) nomeEl.style.fontSize = '15px';
        else if (len > 16) nomeEl.style.fontSize = '14px';

        // Apelido
        if (ritmista.apelido) {
            document.getElementById('apelidoRitmista').textContent = '"' + ritmista.apelido + '"';
        }

        // Instrumento
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';

        // CPF
        document.getElementById('cpfRitmista').textContent = ritmista.cpf || '—';

        // Foto
        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
        }

        // Membro desde
        if (ritmista.membro_desde) {
            document.getElementById('membroDesde').textContent = ritmista.membro_desde;
            document.getElementById('membroDesdeBox').style.display = 'block';
        }

        // Config da escola
        const cfg = (typeof configEscola !== 'undefined') ? configEscola : {};

        document.getElementById('c-escola-nome').textContent = cfg.nomeEscola || '';
        document.getElementById('c-bateria-nome').textContent = cfg.nomeBateria || '';
        document.getElementById('c-verso-titulo').textContent = cfg.nomeBateria || 'Tutti';
        document.getElementById('c-verso-sub').textContent = cfg.nomeEscola || 'Gestão de Baterias';
        if (cfg.mestreDeBateria) {
            document.getElementById('c-mestre-nome').textContent = cfg.mestreDeBateria;
            document.getElementById('c-mestre-bloco').style.display = 'flex';
        }
        if (cfg.temporadaAtual) document.getElementById('c-temporada-valor').textContent = cfg.temporadaAtual;

        const igEl = document.getElementById('c-rodape-instagram');
        if (igEl && cfg.instagramBateria) {
            igEl.textContent = cfg.instagramBateria.startsWith('@') ? cfg.instagramBateria : '@' + cfg.instagramBateria;
        }

        // QR code real apontando para a página de emergência
        const qrUrl = `${window.location.origin}/qr.html?id=${ritmista.id}`;
        new QRCode(document.getElementById('qrcode'), {
            text: qrUrl,
            width: 110,
            height: 110,
            colorDark: '#111111',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        if (cfg.logoEscola) {
            ['logoEscolaFrente', 'logoEscolaVerso'].forEach(id => {
                const img = document.getElementById(id);
                if (img) { img.src = cfg.logoEscola; img.style.display = 'block'; }
            });
        }
    }

    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');

    if (idParam) {
        // Modo admin: botão "Sair" não deve limpar a sessão do admin logado
        const btnSair = document.getElementById('btnSairTopo');
        btnSair.textContent = 'Fechar';
        btnSair.onclick = () => window.close();

        // Modo admin: busca ritmista pelo id na URL
        fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${idParam}&select=*`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        })
        .then(r => r.json())
        .then(rows => {
            if (!rows || rows.length === 0) {
                alert('Ritmista não encontrado.');
                history.back();
                return;
            }
            renderCarteirinha(rows[0]);
        })
        .catch(() => { alert('Erro ao carregar carteirinha.'); history.back(); });
    } else {
        // Modo normal: usa localStorage
        const ritmista = JSON.parse(localStorage.getItem('ritmista'));
        if (!ritmista) {
            window.location.href = 'login.html';
        } else {
            renderCarteirinha(ritmista);
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaInner').classList.toggle('virada');
    }

    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function salvarImagem() {
        alert('Função de salvar imagem será ativada em breve!');
    }

    function compartilhar() {
        const nome = document.getElementById('nomeRitmista').textContent;
        if (navigator.share && nome) {
            navigator.share({
                title: 'Minha Carteirinha — Tutti',
                text: `${nome} — Ritmista. Carnaval 2027!`
            });
        } else {
            alert('Compartilhamento não disponível neste dispositivo.');
        }
    }
</script>
</body>
</html>
