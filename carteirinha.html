<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha - Swing da Leopoldina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
        }

        .topo {
            width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .topo-nome { color: #c9a227; font-size: 12px; letter-spacing: 1px; }
        .btn-sair {
            background: transparent;
            border: 1px solid #c9a227;
            color: #c9a227;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* ── FLIP ── */
        .carteirinha-wrapper {
            width: 300px;
            height: 510px;
            perspective: 1200px;
        }
        .carteirinha-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.9s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .carteirinha-wrapper.virada .carteirinha-inner {
            transform: rotateY(180deg);
        }

        .frente, .verso {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;    /* ocupa exatamente o card */
            border-radius: 22px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 0 1.5px rgba(201,162,39,0.5);
        }
        .verso { transform: rotateY(180deg); }

        /* ═══════════════════════════════
           FRENTE
        ═══════════════════════════════ */
        .frente { background: #FAFAF2; }

        /* SVG atrás de todo conteúdo */
        .bg-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* Conteúdo empilhado sobre o SVG */
        .frente-corpo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho */
        .cabecalho {
            width: 100%;
            background: linear-gradient(180deg, #0a5c2b 0%, #0d7035 100%);
            padding: 14px 12px 12px;
            text-align: center;
            border-bottom: 2px solid #c9a227;
            flex-shrink: 0;
        }
        .cab-escola {
            font-size: 7.5px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .cab-bateria {
            font-size: 17px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cab-bateria em { color: #f0c842; font-style: normal; }

        /* Foto maior */
        .foto-area {
            margin-top: 20px;
            flex-shrink: 0;
        }
        .foto-anel {
            width: 135px; height: 135px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #8B6914, #f0c842, #c9a227, #8B6914);
            box-shadow: 0 8px 28px rgba(201,162,39,0.5);
        }
        .foto-interno {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #ddd;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-size: 50px;
        }
        .foto-interno img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Dados */
        .dados {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 22px 18px;
            min-height: 0;
        }
        .funcao-tag {
            background: #0d7035;
            color: #fff;
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 3px 18px;
            border-radius: 20px;
            margin-bottom: 9px;
            flex-shrink: 0;
        }
        .nome {
            font-size: 19px;
            font-weight: bold;
            color: #111;
            text-align: center;
            line-height: 1.2;
            flex-shrink: 0;
        }
        .apelido {
            font-size: 13px;
            color: #0d7035;
            font-style: italic;
            margin-top: 2px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .divisor {
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a227, transparent);
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .grid-info {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .info-box {
            background: rgba(255,255,255,0.7);
            border: 1px solid #e0e0d8;
            border-radius: 9px;
            padding: 8px 10px;
            text-align: center;
        }
        .info-label {
            font-size: 7px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }
        .info-valor { font-size: 11px; font-weight: bold; color: #1a1a1a; }

        .validade-box {
            width: 100%;
            background: #0d7035;
            border-radius: 10px;
            padding: 9px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .val-label { font-size: 8px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .val-data { font-size: 16px; color: #f0c842; font-weight: bold; }

        /* ═══════════════════════════════
           VERSO
        ═══════════════════════════════ */
        .verso { background: #06200e; }

        .verso-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        .verso-corpo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 28px;
        }
        .verso-logo {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(201,162,39,0.5);
            background: rgba(201,162,39,0.04);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px;
        }
        .verso-escola-nome {
            font-size: 13px;
            font-weight: bold;
            color: #c9a227;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
        }
        .verso-fundacao {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            margin-bottom: 22px;
        }
        .verso-div {
            width: 55%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a227, transparent);
            margin-bottom: 18px;
        }
        .verso-temporada {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .verso-ano {
            font-size: 42px;
            font-weight: bold;
            color: rgba(255,255,255,0.12);
            letter-spacing: 6px;
        }

        /* ── Botões ── */
        .btn-virar {
            margin-top: 18px;
            background: linear-gradient(135deg, #a07c10, #c9a227, #a07c10);
            border: none;
            color: #fff;
            padding: 11px 34px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(201,162,39,0.4);
        }
        .acoes {
            width: 300px;
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .btn-acao {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-salvar {
            background: transparent;
            border: 1px solid #c9a227;
            color: #c9a227;
        }
        .btn-compartilhar {
            background: #128C7E;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="topo">
    <span class="topo-nome">♛ Swing da Leopoldina</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="carteirinha-wrapper" id="carteirinhaWrapper">
    <div class="carteirinha-inner">

        <!-- ════════════ FRENTE ════════════ -->
        <div class="frente">

            <svg class="bg-svg" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <linearGradient id="stripeG" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0a5c2b"/>
                        <stop offset="50%" style="stop-color:#0e7538"/>
                        <stop offset="100%" style="stop-color:#0a5c2b"/>
                    </linearGradient>
                </defs>

                <!-- Fundo branco — como a bandeira da Imperatriz -->
                <rect width="300" height="510" fill="#FAFAF2"/>

                <!-- Faixa diagonal verde — como a bandeira da Imperatriz -->
                <path d="M0,158 L300,268 L300,348 L0,238 Z" fill="url(#stripeG)"/>
                <!-- Brilho sutil na borda superior da faixa -->
                <path d="M0,158 L300,268 L300,280 L0,170 Z" fill="rgba(255,255,255,0.07)"/>

                <!-- ★ COROA MARCA D'ÁGUA com CURVAS SUAVES (arcos góticos) ★
                     Base em y=320, pico central em y=190 — centro visual do card -->
                <g transform="translate(150, 320)" opacity="0.14" fill="#b8870f" stroke="none">

                    <!-- Base da coroa -->
                    <rect x="-78" y="0" width="156" height="24" rx="6"/>

                    <!-- Gemas na base -->
                    <circle cx="-52" cy="12" r="5.5" fill="#c9a227"/>
                    <circle cx="-17" cy="12" r="5.5" fill="#c9a227"/>
                    <circle cx="17"  cy="12" r="5.5" fill="#c9a227"/>
                    <circle cx="52"  cy="12" r="5.5" fill="#c9a227"/>

                    <!-- Corpo da coroa — 5 arcos com curvas bezier suaves -->
                    <path d="
                        M-78,0
                        L-78,-18
                        C-78,-46 -72,-60 -64,-65
                        C-56,-60 -50,-42 -50,-18
                        C-50,-52 -38,-86 -26,-105
                        C-14,-86 -8,-52 -8,-18
                        C-8,-68 -4,-98 0,-132
                        C4,-98 8,-68 8,-18
                        C8,-52 14,-86 26,-105
                        C38,-86 50,-52 50,-18
                        C50,-42 56,-60 64,-65
                        C72,-60 78,-46 78,-18
                        L78,0
                        Z
                    "/>

                    <!-- Orbes nos picos dos arcos -->
                    <circle cx="-64" cy="-67" r="7"  fill="#c9a227"/>
                    <circle cx="-26" cy="-107" r="8" fill="#c9a227"/>
                    <circle cx="0"   cy="-134" r="9" fill="#c9a227"/>
                    <circle cx="26"  cy="-107" r="8" fill="#c9a227"/>
                    <circle cx="64"  cy="-67"  r="7" fill="#c9a227"/>

                    <!-- Cruz no pico central (coroa imperial) -->
                    <rect x="-2"  y="-152" width="4"  height="20" rx="1" fill="#c9a227"/>
                    <rect x="-7"  y="-144" width="14" height="4"  rx="1" fill="#c9a227"/>
                </g>

                <!-- Estrelas sutis — referência à bandeira da Imperatriz -->
                <g fill="#c9a227" opacity="0.1">
                    <circle cx="22"  cy="128" r="3"/>
                    <circle cx="278" cy="128" r="3"/>
                    <circle cx="22"  cy="362" r="3"/>
                    <circle cx="278" cy="362" r="3"/>
                </g>

                <!-- Borda dourada interna -->
                <rect x="5" y="5" width="290" height="500" rx="19"
                      fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.35"/>
            </svg>

            <!-- Conteúdo da frente (sobre o SVG) -->
            <div class="frente-corpo">
                <div class="cabecalho">
                    <div class="cab-escola">G.R.E.S. Imperatriz Leopoldinense</div>
                    <div class="cab-bateria">Swing da <em>Leopoldina</em></div>
                </div>

                <div class="foto-area">
                    <div class="foto-anel">
                        <div class="foto-interno" id="fotoRitmista">👤</div>
                    </div>
                </div>

                <div class="dados">
                    <div class="funcao-tag">✦ Ritmista ✦</div>
                    <div class="nome" id="nomeRitmista">—</div>
                    <div class="apelido" id="apelidoRitmista"></div>
                    <div class="divisor"></div>
                    <div class="grid-info">
                        <div class="info-box">
                            <div class="info-label">CPF</div>
                            <div class="info-valor" id="cpfRitmista">—</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Instrumento</div>
                            <div class="info-valor" id="instrumentoRitmista">—</div>
                        </div>
                    </div>
                    <div class="validade-box">
                        <span class="val-label">Válida até</span>
                        <span class="val-data" id="validadeCarteirinha">31/07/2027</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ════════════ VERSO ════════════ -->
        <div class="verso">

            <svg class="verso-bg" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="vbg" cx="50%" cy="42%" r="60%">
                        <stop offset="0%" style="stop-color:#0f3d1c"/>
                        <stop offset="100%" style="stop-color:#040f07"/>
                    </radialGradient>
                </defs>
                <rect width="300" height="510" fill="url(#vbg)"/>

                <!-- Faixa diagonal sutil (verso da bandeira) -->
                <path d="M0,158 L300,268 L300,348 L0,238 Z" fill="rgba(255,255,255,0.02)"/>

                <!-- Círculos ornamentais centrados exatamente em (150,255) -->
                <circle cx="150" cy="255" r="178" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.1"/>
                <circle cx="150" cy="255" r="138" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.08"/>
                <circle cx="150" cy="255" r="98"  fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.06"/>

                <!-- ★ COROA DO VERSO — mesma forma com curvas suaves, bem centralizada ★ -->
                <!-- Base em y=290, pico central em y=165 → centro em y=227 ≈ centro da área -->
                <g transform="translate(150, 290)" opacity="0.18" fill="#c9a227" stroke="none">
                    <rect x="-62" y="0" width="124" height="20" rx="5"/>
                    <circle cx="-42" cy="10" r="4.5" fill="#c9a227"/>
                    <circle cx="-14" cy="10" r="4.5" fill="#c9a227"/>
                    <circle cx="14"  cy="10" r="4.5" fill="#c9a227"/>
                    <circle cx="42"  cy="10" r="4.5" fill="#c9a227"/>

                    <!-- 5 arcos com curvas suaves -->
                    <path d="
                        M-62,0
                        L-62,-15
                        C-62,-38 -56,-50 -50,-55
                        C-44,-50 -40,-34 -40,-15
                        C-40,-44 -30,-70 -20,-86
                        C-10,-70 -5,-44 -5,-15
                        C-5,-56 -2,-80 0,-108
                        C2,-80 5,-56 5,-15
                        C5,-44 10,-70 20,-86
                        C30,-70 40,-44 40,-15
                        C40,-34 44,-50 50,-55
                        C56,-50 62,-38 62,-15
                        L62,0
                        Z
                    "/>
                    <circle cx="-50" cy="-57" r="6"  fill="#c9a227"/>
                    <circle cx="-20" cy="-88" r="7"  fill="#c9a227"/>
                    <circle cx="0"   cy="-110" r="8" fill="#c9a227"/>
                    <circle cx="20"  cy="-88" r="7"  fill="#c9a227"/>
                    <circle cx="50"  cy="-57" r="6"  fill="#c9a227"/>
                    <!-- Cruz no pico -->
                    <rect x="-2"  y="-122" width="4"  height="14" rx="1"/>
                    <rect x="-5"  y="-116" width="10" height="3"  rx="1"/>
                </g>

                <!-- Ornamentos dos 4 cantos -->
                <g stroke="#c9a227" stroke-width="0.8" fill="rgba(201,162,39,0.06)" opacity="0.3">
                    <polygon points="12,12 28,20 20,36 12,36"/>
                    <polygon points="288,12 272,20 280,36 288,36"/>
                    <polygon points="12,498 28,490 20,474 12,474"/>
                    <polygon points="288,498 272,490 280,474 288,474"/>
                </g>

                <!-- Borda interna dourada -->
                <rect x="5" y="5" width="290" height="500" rx="19"
                      fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.25"/>
            </svg>

            <div class="verso-corpo">
                <!-- Logo da Imperatriz — coroa SVG artística -->
                <div class="verso-logo">
                    <svg viewBox="0 0 110 110" width="88" height="88">
                        <g transform="translate(55, 72)" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-linejoin="round">
                            <rect x="-38" y="0" width="76" height="14" rx="3" fill="rgba(201,162,39,0.1)"/>
                            <circle cx="-25" cy="7" r="3.5" fill="#c9a227" stroke="none" opacity="0.7"/>
                            <circle cx="-8"  cy="7" r="3.5" fill="#c9a227" stroke="none" opacity="0.7"/>
                            <circle cx="8"   cy="7" r="3.5" fill="#c9a227" stroke="none" opacity="0.7"/>
                            <circle cx="25"  cy="7" r="3.5" fill="#c9a227" stroke="none" opacity="0.7"/>

                            <path d="
                                M-38,0 L-38,-11
                                C-38,-28 -33,-36 -28,-40
                                C-23,-36 -20,-24 -20,-11
                                C-20,-30 -13,-48 -7,-60
                                C-1,-48 4,-30 4,-11
                                C4,-42 7,-58 11,-72
                                C15,-58 18,-42 18,-11
                                C18,-30 25,-48 31,-60
                                C37,-48 44,-30 44,-11
                                C44,-24 47,-36 52,-40
                                C57,-36 62,-28 62,-11
                                L62,0
                            " fill="rgba(201,162,39,0.1)"/>

                            <circle cx="-28" cy="-42" r="4"   fill="#c9a227" stroke="none"/>
                            <circle cx="-7"  cy="-62" r="4.5" fill="#c9a227" stroke="none"/>
                            <circle cx="11"  cy="-74" r="5"   fill="#c9a227" stroke="none"/>
                            <circle cx="31"  cy="-62" r="4.5" fill="#c9a227" stroke="none"/>
                            <circle cx="52"  cy="-42" r="4"   fill="#c9a227" stroke="none"/>

                            <line x1="11" y1="-84" x2="11" y2="-66" stroke="#c9a227" stroke-width="1.2"/>
                            <line x1="5"  y1="-75" x2="17" y2="-75" stroke="#c9a227" stroke-width="1.2"/>
                        </g>
                    </svg>
                </div>

                <div class="verso-escola-nome">Imperatriz Leopoldinense</div>
                <div class="verso-fundacao">✦ Fundada em 1959 · Rio de Janeiro ✦</div>
                <div class="verso-div"></div>
                <div class="verso-temporada">Temporada</div>
                <div class="verso-ano">2027</div>
            </div>
        </div>

    </div>
</div>

<button class="btn-virar" onclick="virarCarteirinha()">🔄 Virar carteirinha</button>

<div class="acoes">
    <button class="btn-acao btn-salvar" onclick="salvarImagem()">💾 Salvar</button>
    <button class="btn-acao btn-compartilhar" onclick="compartilhar()">📲 Compartilhar</button>
</div>

<script>
    const ritmista = JSON.parse(localStorage.getItem('ritmista'));

    if (!ritmista) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('nomeRitmista').textContent = ritmista.nome;
        document.getElementById('apelidoRitmista').textContent = ritmista.apelido ? `"${ritmista.apelido}"` : '';
        document.getElementById('cpfRitmista').textContent = ritmista.cpf;
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';

        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaWrapper').classList.toggle('virada');
    }

    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function salvarImagem() {
        alert('Função de salvar imagem será ativada em breve!');
    }

    function compartilhar() {
        if (navigator.share && ritmista) {
            navigator.share({
                title: 'Minha Carteirinha — Swing da Leopoldina',
                text: `${ritmista.nome} — Ritmista da Imperatriz Leopoldinense. Válida até 31/07/2027!`,
            });
        } else {
            alert('Compartilhamento não disponível neste dispositivo.');
        }
    }
</script>
</body>
</html>
