<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha — TumTu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="carteirinha-tumtu.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="config-escola.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cor-fundo-escuro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }
        .topo {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            z-index: 10;
        }
        .topo-nome {
            font-size: 11px;
            color: #D4AF37;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .btn-sair {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.3);
            color: #D4AF37;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .btn-sair:hover { background: rgba(212,175,55,0.08); }
        .carteirinha-scene { margin-top: 40px; }
        .c-btn-perfil {
            width: 24px; height: 24px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 0;
        }
        .c-btn-perfil:hover { background: rgba(212,175,55,0.15); }
        .c-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #1e1b2e; color: white; padding: 12px 20px; border-radius: 12px;
            font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 9999; display: none; border-left: 4px solid #D4AF37; max-width: 90vw;
        }
        .c-toast.erro { border-left-color: #ef4444; }
        .c-toast.visivel { display: block; }
    </style>
</head>
<body>

<div class="topo">
    <span class="topo-nome">TumTu</span>
    <button class="btn-sair" id="btnSairTopo" onclick="sair()">Sair</button>
</div>

<div class="carteirinha-scene">

    <div class="c-hint">↺ toque para virar</div>

    <div class="carteirinha-wrap" onclick="virarCarteirinha()">
        <div class="carteirinha-inner" id="carteirinhaInner">

            <!-- ════ FRENTE ════ -->
            <div class="carteirinha-face">
                <div class="c-frente">
                    <div class="c-tri-esquerda-1"></div>
                    <div class="c-tri-esquerda-2"></div>
                    <div class="c-tri-direita-1"></div>
                    <div class="c-tri-direita-2"></div>
                    <div class="c-tri-topo"></div>

                    <div class="c-header">
                        <div>
                            <div class="c-escola" id="c-escola-nome"></div>
                            <div class="c-bateria" id="c-bateria-nome"></div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
                            <div class="c-status">
                                <div class="c-status-dot"></div>
                                Ativo
                            </div>
                            <button class="c-btn-perfil" id="btnAbrirPerfil" style="display:none;" onclick="event.stopPropagation(); abrirPerfil();" aria-label="Meu perfil">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#D4AF37" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="c-foto-area">
                        <div class="c-foto" id="fotoRitmista">
                            <div class="c-foto-anel"></div>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="8" r="4"/>
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                            </svg>
                        </div>
                        <div class="c-role" id="cRole">Ritmista</div>
                    </div>

                    <div class="c-identidade">
                        <div class="c-nome" id="nomeRitmista">—</div>
                        <div class="c-apelido" id="apelidoRitmista"></div>
                        <div class="c-instrumento" id="instrumentoRitmista">—</div>
                    </div>

                    <div class="c-divisor"></div>

                    <div class="c-cpf">
                        <div class="c-label">CPF</div>
                        <div class="c-valor" id="cpfRitmista">—</div>
                    </div>

                    <!-- Membro desde — canto inferior esquerdo -->
                    <div class="c-membro-desde" id="membroDesdeBox" style="display:none">
                        <div class="c-label">Membro desde</div>
                        <div class="c-valor" id="membroDesde">—</div>
                    </div>

                    <!-- Logo da escola — canto inferior direito -->
                    <div class="c-logo">
                        <div class="c-logo-circulo">
                            <img id="logoEscolaFrente" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ════ VERSO ════ -->
            <div class="carteirinha-face carteirinha-verso">
                <div class="c-verso-bg">
                    <div class="c-verso-tri-esquerda"></div>
                    <div class="c-verso-tri-direita"></div>

                    <div class="c-verso-header">
                        <div>
                            <div class="c-verso-titulo" id="c-verso-titulo">TumTu</div>
                            <div class="c-verso-sub" id="c-verso-sub">Gestão de Baterias</div>
                        </div>
                        <div class="c-logo-verso">
                            <img id="logoEscolaVerso" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
                        </div>
                    </div>

                    <div class="c-qr-area">
                        <div class="c-qr">
                            <div id="qrcode"></div>
                        </div>
                        <div class="c-qr-label">Validação Digital</div>
                    </div>

                    <div class="c-mestre" id="c-mestre-bloco" style="display:none">
                        <div class="c-mestre-label" id="c-mestre-label">Mestre de Bateria</div>
                        <div class="c-mestre-nomes" id="c-mestre-nomes"></div>
                    </div>

                    <!-- Válida até + Temporada — lado a lado com divisória vertical -->
                    <div class="c-validade-temporada">
                        <div class="c-validade">
                            <div class="c-label">Válida até</div>
                            <div class="c-validade-valor">31/07/2027</div>
                        </div>
                        <div class="c-divisor-vertical"></div>
                        <div class="c-temporada">
                            <div class="c-label">Temporada</div>
                            <div class="c-temporada-valor" id="c-temporada-valor">Carnaval 2027</div>
                        </div>
                    </div>

                    <div class="c-verso-rodape">
                        <div class="c-rodape-instagram" id="c-rodape-instagram"></div>
                        <div class="c-rodape-tumtu tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="c-botoes">
        <button class="c-btn-salvar" disabled title="Em breve">Salvar (em breve)</button>
        <button class="c-btn-compartilhar" onclick="compartilhar()">Compartilhar</button>
    </div>

</div>

<!-- MODAL: MEU PERFIL -->
<div class="ficha-modal-overlay" id="modalPerfilOverlay" style="display:none;" onclick="if(event.target===this) fecharPerfil()">
    <div class="ficha-modal-box">
        <div id="fp-container-perfil"></div>
        <div style="text-align:right; margin-top:12px;">
            <button class="btn-ficha" onclick="fecharPerfil()">Fechar</button>
        </div>
    </div>
</div>

<div class="c-toast" id="cToast"></div>

<script src="ficha-perfil.js"></script>
<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function mostrarToast(msg, tipo = 'ok') {
        const t = document.getElementById('cToast');
        t.textContent = msg;
        t.className = 'c-toast visivel ' + tipo;
        setTimeout(() => { t.className = 'c-toast'; }, 3500);
    }

    function renderCarteirinha(ritmista) {
        // Label de cargo
        const perfil = ritmista.perfil || 'ritmista';
        const labelCargo = perfil === 'mestre' ? 'Mestre de Bateria'
            : perfil === 'diretor' ? 'Diretor'
            : 'Ritmista';
        document.getElementById('cRole').textContent = labelCargo;

        // Nome
        const nomeEl = document.getElementById('nomeRitmista');
        nomeEl.textContent = ritmista.nome;
        const len = ritmista.nome.length;
        if (len > 30) nomeEl.style.fontSize = '13px';
        else if (len > 22) nomeEl.style.fontSize = '15px';
        else if (len > 16) nomeEl.style.fontSize = '14px';

        // Apelido
        if (ritmista.apelido) {
            document.getElementById('apelidoRitmista').textContent = '"' + ritmista.apelido + '"';
        }

        // Instrumento
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';

        // CPF
        document.getElementById('cpfRitmista').textContent = ritmista.cpf || '—';

        // Foto
        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
        }

        // Membro desde
        if (ritmista.membro_desde) {
            document.getElementById('membroDesde').textContent = ritmista.membro_desde;
            document.getElementById('membroDesdeBox').style.display = 'block';
        }

        // Config da escola
        const cfg = (typeof configEscola !== 'undefined') ? configEscola : {};

        document.getElementById('c-escola-nome').textContent = cfg.nomeEscola || '';
        document.getElementById('c-bateria-nome').textContent = cfg.nomeBateria || '';
        document.getElementById('c-verso-titulo').textContent = cfg.nomeBateria || 'TumTu';
        document.getElementById('c-verso-sub').textContent = cfg.nomeEscola || 'Gestão de Baterias';
        if (cfg.temporadaAtual) document.getElementById('c-temporada-valor').textContent = cfg.temporadaAtual;

        const igEl = document.getElementById('c-rodape-instagram');
        if (igEl && cfg.instagramBateria) {
            igEl.textContent = cfg.instagramBateria.startsWith('@') ? cfg.instagramBateria : '@' + cfg.instagramBateria;
        }

        // QR code real apontando para a página de emergência
        const qrUrl = `${window.location.origin}/qr.html?id=${ritmista.id}`;
        new QRCode(document.getElementById('qrcode'), {
            text: qrUrl,
            width: 110,
            height: 110,
            colorDark: '#111111',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        if (cfg.logoEscola) {
            ['logoEscolaFrente', 'logoEscolaVerso'].forEach(id => {
                const img = document.getElementById(id);
                if (img) { img.src = cfg.logoEscola; img.style.display = 'block'; }
            });
        }
    }

    async function renderMestres(bateriaId) {
        if (!bateriaId) return;
        try {
            const res = await fetch(
                `${SUPABASE_URL}/rest/v1/mestres_publicos?bateria_id=eq.${bateriaId}&select=nome&order=nome.asc`,
                { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
            );
            const mestres = await res.json();
            if (!Array.isArray(mestres) || mestres.length === 0) return;

            const bloco = document.getElementById('c-mestre-bloco');
            const container = document.getElementById('c-mestre-nomes');
            const label = document.getElementById('c-mestre-label');

            label.textContent = mestres.length > 1 ? 'Mestres de Bateria' : 'Mestre de Bateria';
            container.classList.toggle('varios', mestres.length > 1);
            container.innerHTML = mestres.map(m => `<div class="c-mestre-nome">${m.nome}</div>`).join('');
            bloco.style.display = 'flex';
        } catch (e) {
            // Silencioso — carteirinha continua funcional sem o bloco de mestre
        }
    }

    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');

    if (idParam) {
        // Modo admin: botão "Sair" não deve limpar a sessão do admin logado
        const btnSair = document.getElementById('btnSairTopo');
        btnSair.textContent = 'Fechar';
        btnSair.onclick = () => window.close();

        // Modo admin: busca ritmista pelo id na URL
        (async () => {
            const { data: sessionData } = await sb.auth.getSession();
            const token = sessionData.session ? sessionData.session.access_token : SUPABASE_KEY;
            fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${idParam}&select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(rows => {
                if (!rows || rows.length === 0) {
                    mostrarToast('Ritmista não encontrado.', 'erro');
                    setTimeout(() => history.back(), 1200);
                    return;
                }
                renderCarteirinha(rows[0]);
                renderMestres(rows[0].bateria_id);
            })
            .catch(() => { mostrarToast('Erro ao carregar carteirinha.', 'erro'); setTimeout(() => history.back(), 1200); });
        })();
    } else {
        // Modo normal: usa localStorage
        const ritmista = JSON.parse(localStorage.getItem('ritmista'));
        if (!ritmista) {
            window.location.href = 'login.html';
        } else {
            renderCarteirinha(ritmista);
            renderMestres(ritmista.bateria_id);
            document.getElementById('btnAbrirPerfil').style.display = 'flex';
        }
    }

    async function abrirPerfil() {
        const u = JSON.parse(localStorage.getItem('ritmista') || 'null');
        if (!u) return;
        await fpMontar(document.getElementById('fp-container-perfil'));
        fpIniciar(u, u.perfil, u.id, {
            aoSalvar: (novosDados) => {
                document.getElementById('apelidoRitmista').textContent = novosDados.apelido ? '"' + novosDados.apelido + '"' : '';
                if (novosDados.foto_url) {
                    const img = document.createElement('img');
                    img.src = novosDados.foto_url;
                    const box = document.getElementById('fotoRitmista');
                    box.innerHTML = '';
                    box.appendChild(img);
                }
            }
        });
        document.getElementById('modalPerfilOverlay').style.display = 'flex';
    }

    function fecharPerfil() {
        document.getElementById('modalPerfilOverlay').style.display = 'none';
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaInner').classList.toggle('virada');
    }

    async function sair() {
        await sb.auth.signOut();
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function compartilhar() {
        const nome = document.getElementById('nomeRitmista').textContent;
        if (navigator.share && nome) {
            navigator.share({
                title: 'Minha Carteirinha — TumTu',
                text: `${nome} — Ritmista. Carnaval 2027!`
            });
        } else {
            mostrarToast('Compartilhamento não disponível neste dispositivo.', 'erro');
        }
    }
</script>
</body>
</html>
