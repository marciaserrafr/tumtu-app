<!DOCTYPE html>
<html lang="pt-BR" data-tema="swing-da-leopoldina">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmistas - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            background: var(--cor-fundo-claro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.35);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 { color: #0f172a; font-size: 28px; font-weight: bold; }
        .logo p { color: #666; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--cor-destaque); }
        .btn-entrar { width: 100%; margin-top: 8px; font-size: 16px; }
        .link-cadastro {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .link-cadastro a { color: #D4AF37; font-weight: bold; text-decoration: none; }
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .mensagem.erro { background: #f8d7da; color: #721c24; }
        .mensagem.aviso { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>🥁 Ritmistas</h1>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <form id="formLogin">
        <div class="form-group">
            <label>CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" required>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn-entrar btn-primario">Entrar</button>
    </form>

    <div class="link-cadastro">
        Ainda não tem cadastro? <a href="index.html">Cadastre-se</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';

    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = v;
    }

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();

        const cpf = document.getElementById('cpf').value;
        const senha = document.getElementById('senha').value;

        const res = await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?cpf=eq.${encodeURIComponent(cpf)}&senha=eq.${encodeURIComponent(senha)}&select=*`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });

        const dados = await res.json();

        if (dados.length === 0) {
            mostrarMensagem('CPF ou senha incorretos.', 'erro');
            return;
        }

        const ritmista = dados[0];

        if (ritmista.status === 'pendente') {
            mostrarMensagem('Seu cadastro ainda está aguardando aprovação da diretoria.', 'aviso');
            return;
        }

        if (ritmista.status === 'rejeitado') {
            mostrarMensagem('Seu cadastro foi recusado. Entre em contato com a diretoria.', 'erro');
            return;
        }

        localStorage.setItem('ritmista', JSON.stringify(ritmista));
        window.location.href = 'carteirinha.html';
    });
</script>
</body>
</html>
