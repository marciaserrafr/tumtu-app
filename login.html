<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu" style="background:#12101a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TumTu — Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css?v=1">
    <link rel="stylesheet" href="styles/components.css?v=1">
    <script src="config-escola.js?v=1" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            background: #12101a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 { color: #0f172a; font-size: 28px; font-weight: bold; }
        .logo p { color: var(--cor-texto-secundario); font-size: 14px; margin-top: 4px; }
        .label-dica {
            font-size: 12px;
            font-weight: 400;
            color: var(--cor-texto-muted);
            margin-left: 4px;
        }
        .btn-entrar { width: 100%; margin-top: 8px; font-size: 16px; }
        .link-cadastro {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--cor-texto-secundario);
        }
        .link-cadastro a { color: #D4AF37; font-weight: bold; text-decoration: none; }
        .spinner {
            width: 32px; height: 32px; margin: 28px auto 8px;
            border: 3px solid rgba(15,23,42,0.15);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: tt-girar 0.8s linear infinite;
        }
        @keyframes tt-girar { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation-duration: 1.6s; }
        }
        .texto-carregando { text-align: center; color: var(--cor-texto-secundario); font-size: 14px; }
    </style>
</head>
<body>
<!-- Enquanto confere se já existe sessão válida (ou enquanto monta a carteirinha
     depois do login), mostra só isso — nunca o formulário nem a carteirinha
     pela metade. Some assim que souber que precisa mesmo pedir usuário/senha. -->
<div class="auth-container" id="containerCarregando">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
    </div>
    <div class="spinner" role="status" aria-label="Carregando"></div>
    <p class="texto-carregando">Carregando...</p>
</div>

<div class="auth-container" id="containerLogin" style="display:none;">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <form id="formLogin">
        <div class="auth-form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificador" placeholder="000.000.000-00 ou seu@email.com" autocomplete="username" required oninput="mascaraIdentificador(this)">
        </div>
        <div class="auth-form-group">
            <label>Senha</label>
            <div style="position:relative;">
                <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required style="padding-right:40px;">
                <button type="button" aria-label="Mostrar senha" aria-pressed="false" onclick="toggleSenha('senha',this)" style="position:absolute;right:0;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:13px;"><svg width="18" height="18" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </div>
        <button type="submit" class="btn-entrar btn-primario">Entrar</button>
    </form>

    <div class="link-cadastro">
        <a href="#" onclick="mostrarRecuperacao(event)">Esqueci minha senha</a>
    </div>

    <div class="link-cadastro">
        Ainda não tem cadastro? <a href="cadastro.html">Cadastre-se</a>
    </div>
</div>

<div class="auth-container" id="containerEscolherBateria" style="display:none;">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
        <p>Qual bateria você quer ver?</p>
    </div>
    <div id="listaBaterias"></div>
</div>

<div class="auth-container" id="containerRecuperacao" style="display:none;">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
        <p>Recuperar senha</p>
    </div>

    <div id="mensagemRecuperacao" class="mensagem"></div>

    <form id="formRecuperacao">
        <div class="auth-form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificadorRecuperacao" placeholder="000.000.000-00 ou seu@email.com" required oninput="mascaraIdentificador(this)">
        </div>
        <button type="submit" class="btn-entrar btn-primario">Enviar link de recuperação</button>
    </form>

    <div class="link-cadastro">
        <a href="#" onclick="mostrarRecuperacao(event)">Voltar ao login</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    // Fica só declarado aqui — o script do Supabase agora carrega com
    // "defer" (não trava mais o resto da página enquanto baixa, resolve a
    // tela preta demorada reportada pela Márcia em 15/jul/2026). Isso
    // significa que "window.supabase" só existe depois do DOMContentLoaded
    // — por isso a criação de verdade do cliente (sb = ...) e a checagem
    // de sessão ficam dentro do listener de DOMContentLoaded lá embaixo.
    let sb;

    // Enquanto essa checagem roda, o spinner (#containerCarregando) já está
    // visível por padrão no HTML — só troca pro formulário de login se
    // descobrir que precisa mesmo pedir usuário/senha (sem sessão válida).
    function mostrarFormularioLogin() {
        document.getElementById('containerCarregando').style.display = 'none';
        document.getElementById('containerLogin').style.display = 'block';
    }

    // Guarda cor/nome/logo da escola em localStorage — mesma chave que
    // carteirinha.html já lê (lerConfigCache) — pra ela nascer pronta assim
    // que a gente troca de tela, sem esperar rede nenhuma na própria tela
    // da carteirinha. Roda ainda aqui no login, com o spinner na tela — a
    // Márcia preferiu esperar mais tempo aqui (honesto, "carregando") do que
    // ver a carteirinha aparecer incompleta (15/jul/2026).
    function chaveCacheConfig(bateriaId) {
        return `tumtu_cfg_${bateriaId}`;
    }

    async function prefetchConfigEscola(bateriaId, token) {
        if (!bateriaId) return;
        try {
            const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` };
            const resBateria = await fetch(`${SUPABASE_URL}/rest/v1/baterias?id=eq.${bateriaId}&select=nome,instagram,escola_id,logo_url`, { headers: hdrs });
            const baterias = await resBateria.json();
            const bateria = Array.isArray(baterias) && baterias[0] ? baterias[0] : null;
            if (!bateria || !bateria.escola_id) return;

            const resEscola = await fetch(`${SUPABASE_URL}/rest/v1/escolas?id=eq.${bateria.escola_id}&select=nome,temporada_atual,cor_primaria,cor_secundaria,cor_terciaria,cor_quaternaria,logo_url`, { headers: hdrs });
            const escolas = await resEscola.json();
            const escola = Array.isArray(escolas) && escolas[0] ? escolas[0] : null;
            if (!escola) return;

            const cfg = {
                nomeEscola: escola.nome || '',
                nomeBateria: bateria.nome || '',
                instagramBateria: bateria.instagram || '',
                temporadaAtual: escola.temporada_atual || '',
                cores: [escola.cor_primaria, escola.cor_secundaria, escola.cor_terciaria, escola.cor_quaternaria].filter(Boolean),
                escolaId: bateria.escola_id,
                logoEscola: escola.logo_url || null,
                logoBateria: bateria.logo_url || null,
            };
            localStorage.setItem(chaveCacheConfig(bateriaId), JSON.stringify(cfg));
        } catch (e) {
            // Sem cache não quebra nada — carteirinha.html ainda busca sozinha se precisar.
        }
    }

    // Busca todos os vínculos da pessoa e decide: entra direto (só 1 vínculo
    // e não é troca forçada) ou mostra a telinha de escolher bateria.
    // Compartilhada entre o login manual e "Trocar de bateria" (reaproveita
    // a sessão já aberta, sem pedir senha de novo).
    async function buscarEEscolherVinculos(pessoaId, forcarEscolha) {
        const { data: vinculos } = await sb.from('ritmistas_com_instrumento').select('*').eq('pessoa_id', pessoaId);
        if (!vinculos || vinculos.length === 0) {
            mostrarMensagem('Você ainda não tem vínculo com nenhuma bateria. Procure seu Mestre ou Diretor pra pedir o link de cadastro.', 'aviso');
            mostrarFormularioLogin();
            return;
        }

        // Busca o modo_piloto de cada bateria envolvida e anexa em cada vínculo — usado pra decidir admin.html x carteirinha.html.
        const { data: baterias } = await sb.from('baterias').select('id, nome, modo_piloto').in('id', vinculos.map(v => v.bateria_id));
        const infoPorBateria = Object.fromEntries((baterias || []).map(b => [b.id, b]));
        vinculos.forEach(v => { v.modo_piloto = infoPorBateria[v.bateria_id]?.modo_piloto || false; v.totalVinculos = vinculos.length; });

        if (vinculos.length === 1 && !forcarEscolha) {
            continuarComVinculo(vinculos[0]);
            return;
        }

        // Mais de uma bateria (ou troca forçada) — mostra a telinha de escolha em vez de entrar direto.
        const nomesPorBateria = Object.fromEntries((baterias || []).map(b => [b.id, b.nome]));
        const cargoLabelVinculo = v => v.perfil === 'mestre' ? (v.genero === 'feminino' ? 'Mestra de Bateria' : 'Mestre de Bateria')
            : v.perfil === 'diretor' ? (v.genero === 'feminino' ? 'Diretora' : 'Diretor')
            : 'Ritmista';

        document.getElementById('listaBaterias').innerHTML = vinculos.map((v, i) => `
            <button type="button" class="btn-secundario" style="width:100%;margin-top:10px;text-align:left;" onclick="escolherVinculo(${i})">
                ${nomesPorBateria[v.bateria_id] || 'Bateria'} <span class="label-dica">— ${cargoLabelVinculo(v)}</span>
            </button>`).join('');
        window.vinculosParaEscolher = vinculos;
        document.getElementById('containerCarregando').style.display = 'none';
        document.getElementById('containerLogin').style.display = 'none';
        document.getElementById('containerEscolherBateria').style.display = 'block';
    }

    async function tentarSessaoExistente() {
        const params = new URLSearchParams(window.location.search);
        const forcarTroca = params.get('trocar') === '1';

        const cache = JSON.parse(localStorage.getItem('ritmista') || 'null');
        if (!cache) { mostrarFormularioLogin(); return; }

        const { data: { session } } = await sb.auth.getSession();
        if (!session) { localStorage.removeItem('ritmista'); mostrarFormularioLogin(); return; }

        if (cache.super_admin) {
            window.location.href = 'super-admin.html';
            return;
        }

        // Sessão salva antes do recurso "Trocar de Bateria" existir não tem
        // totalVinculos guardado — busca de novo (com telinha de escolha se
        // for o caso) pra se auto-corrigir, sem precisar deslogar.
        if (forcarTroca || cache.totalVinculos === undefined) {
            await buscarEEscolherVinculos(cache.pessoa_id, forcarTroca);
            return;
        }

        const isAdmin = cache.perfil === 'mestre' || cache.perfil === 'diretor';
        if (isAdmin && !cache.modo_piloto) {
            window.location.href = 'admin.html';
            return;
        }
        await prefetchConfigEscola(cache.bateria_id, session.access_token);
        window.location.href = 'carteirinha.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        tentarSessaoExistente();
    });

    const ICONE_OLHO_ABERTO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    const ICONE_OLHO_FECHADO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function toggleSenha(id, btn) {
        const input = document.getElementById(id);
        const visivel = input.type === 'text';
        input.type = visivel ? 'password' : 'text';
        btn.setAttribute('aria-pressed', String(!visivel));
        btn.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
        btn.innerHTML = (visivel ? ICONE_OLHO_ABERTO : ICONE_OLHO_FECHADO).replace('<svg', '<svg aria-hidden="true"');
    }

    function mascaraIdentificador(input) {
        const v = input.value;
        if (/[a-zA-Z@]/.test(v)) return;
        let n = v.replace(/\D/g, '');
        if (n.length > 11) n = n.slice(0, 11);
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = n;
    }

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
    }

    async function continuarComVinculo(vinculo) {
        const perfil = vinculo.perfil || 'ritmista';
        const isAdmin = perfil === 'mestre' || perfil === 'diretor';

        if (vinculo.status === 'pendente') {
            mostrarMensagem(isAdmin
                ? 'Seu cadastro está em análise. Você poderá acessar o painel assim que for aprovado.'
                : 'Seu cadastro ainda está aguardando aprovação da diretoria.', 'aviso');
            return;
        }
        if (vinculo.status === 'rejeitado') {
            mostrarMensagem(isAdmin
                ? 'Seu cadastro foi recusado. Entre em contato com o Super Admin.'
                : 'Seu cadastro foi recusado. Entre em contato com a diretoria.', 'erro');
            return;
        }

        localStorage.setItem('ritmista', JSON.stringify(vinculo));

        if (isAdmin && !vinculo.modo_piloto) {
            window.location.href = 'admin.html';
            return;
        }

        // Vai pra carteirinha — troca pro spinner (sai do formulário/tela de
        // escolher bateria) e busca cor/logo da escola ANTES de trocar de
        // tela, pra ela já nascer pronta (ver prefetchConfigEscola acima).
        document.getElementById('containerLogin').style.display = 'none';
        document.getElementById('containerEscolherBateria').style.display = 'none';
        document.getElementById('containerCarregando').style.display = 'block';
        const { data: { session } } = await sb.auth.getSession();
        await prefetchConfigEscola(vinculo.bateria_id, session ? session.access_token : null);
        window.location.href = 'carteirinha.html';
    }

    function escolherVinculo(indice) {
        continuarComVinculo(window.vinculosParaEscolher[indice]);
    }

    function mostrarRecuperacao(e) {
        e.preventDefault();
        const login = document.getElementById('containerLogin');
        const recuperacao = document.getElementById('containerRecuperacao');
        const abrindo = recuperacao.style.display === 'none';
        login.style.display = abrindo ? 'none' : 'block';
        recuperacao.style.display = abrindo ? 'block' : 'none';
    }

    document.getElementById('formRecuperacao').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type=submit]');
        const textoOriginal = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Enviando...';
        try {
            const identificador = document.getElementById('identificadorRecuperacao').value.trim();
            const isEmail = identificador.includes('@');

            let authEmail = identificador;
            if (!isEmail) {
                const { data: emailResolvido } = await sb.rpc('resolve_login_email', { identificador });
                authEmail = emailResolvido;
            }

            const mensagemEl = document.getElementById('mensagemRecuperacao');
            // Mensagem sempre igual, exista ou não o cadastro — evita revelar quais CPFs/e-mails estão cadastrados.
            if (authEmail) {
                await sb.auth.resetPasswordForEmail(authEmail, {
                    redirectTo: window.location.origin + '/redefinir-senha.html',
                });
            }
            mensagemEl.textContent = 'Se o CPF ou e-mail existir no sistema, você vai receber um link de recuperação em instantes.';
            mensagemEl.className = 'mensagem aviso';
            mensagemEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = textoOriginal;
        }
    });

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type=submit]');
        const textoOriginal = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Entrando...';
        try {

        const identificador = document.getElementById('identificador').value.trim();
        const senha = document.getElementById('senha').value;
        const isEmail = identificador.includes('@');

        let authEmail = identificador;
        if (!isEmail) {
            const { data: emailResolvido, error: erroResolucao } = await sb.rpc('resolve_login_email', { identificador });
            if (erroResolucao || !emailResolvido) {
                mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
                return;
            }
            authEmail = emailResolvido;
        }

        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email: authEmail, password: senha });
        if (authError || !authData.user) {
            mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }

        // Super Admin não tem vínculo com bateria nenhuma — checa isso primeiro, direto na tabela de pessoas.
        const { data: pessoa } = await sb.from('pessoas').select('id, nome, super_admin').eq('auth_user_id', authData.user.id).maybeSingle();
        if (!pessoa) {
            mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }
        if (pessoa.super_admin) {
            localStorage.setItem('ritmista', JSON.stringify({ pessoa_id: pessoa.id, id: pessoa.id, super_admin: true, perfil: 'super_admin', nome: pessoa.nome }));
            window.location.href = 'super-admin.html';
            return;
        }

        await buscarEEscolherVinculos(pessoa.id, false);
        } finally {
            btn.disabled = false;
            btn.textContent = textoOriginal;
        }
    });
</script>
</body>
</html>
