<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu" style="background:#12101a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TumTu — Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css?v=4">
    <link rel="stylesheet" href="styles/components.css?v=8">
    <script src="config-escola.js?v=1" defer></script>
    <script src="config-suporte.js?v=1" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        button { font-family: inherit; }
        body.tela-auth-escura .auth-container { max-width: 380px; }
        .btn-entrar { width: 100%; margin-top: 8px; font-size: 16px; }
        /* Link de suporte fica visualmente quieto — não deve competir com
           "Esqueci minha senha"/"Cadastre-se", que são as ações comuns de
           verdade (revisão de UX pedida pela Márcia, 18/jul/2026). */
        /* 21/jul/2026: deixou de ficar sempre visível — pesquisa de UX
           confirmou que "fale com o suporte" funciona melhor aparecendo só
           quando algo dá errado (login recusado, cadastro suspenso etc.),
           não espalhado na tela antes de qualquer problema acontecer.
           "Esqueci minha senha" continua sempre visível (é autosserviço,
           não depende de erro). Ver mostrarMensagem(). */
        .rodape-suporte {
            display: none;
            position: fixed; left: 0; right: 0; bottom: 14px; text-align: center;
            color: #55506e; font-weight: 500; font-size: 11.5px; text-decoration: none;
            z-index: 5;
        }
        .rodape-suporte.visivel { display: block; }
        .rodape-suporte:hover, .rodape-suporte:focus-visible {
            color: #a39fc0; text-decoration: underline;
        }
        /* Spinner sozinho, maior, sem logo nem texto — pedido da Márcia em
           17/jul/2026, inspirado no padrão Disney+/Netflix (símbolo universal
           de espera, não precisa de mais nada junto). Container próprio fora
           do fluxo normal (position:fixed;inset:0) pra centralizar de verdade
           na tela, independente do padding-top pensado pro formulário. */
        #containerCarregando {
            position: fixed; inset: 0; width: 100%; max-width: none;
            display: flex; align-items: center; justify-content: center;
            padding: 0; z-index: 2;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(212,175,55,0.15);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: tt-girar 0.8s linear infinite;
            filter: drop-shadow(0 0 6px rgba(212,175,55,0.55));
        }
        @keyframes tt-girar { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation-duration: 1.6s; }
        }
    </style>
</head>
<body class="tela-auth-escura">
<div class="fundo-decorativo" aria-hidden="true"><div class="fd-big"></div><div class="fd-small"></div></div>
<!-- Enquanto confere se já existe sessão válida (ou enquanto monta a carteirinha
     depois do login), mostra só isso — nunca o formulário nem a carteirinha
     pela metade. Some assim que souber que precisa mesmo pedir usuário/senha.
     17/jul/2026: passou por logo+spinner+texto, depois por uma animação dos
     dois círculos da marca "Tum-Tu" (revertida no mesmo dia), até chegar
     aqui — spinner dourado sozinho e maior, sem logo nem texto (referência
     Disney+/Netflix, símbolo universal de espera). -->
<div class="auth-container" id="containerCarregando">
    <div class="spinner" role="status" aria-label="Carregando"></div>
</div>

<div class="auth-container" id="containerLogin" style="display:none;">
    <div class="logo">
        <div class="simbolo-marca"><div class="big"></div><div class="small"></div></div>
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <form id="formLogin">
        <div class="auth-form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificador" placeholder="000.000.000-00 ou seu@email.com" autocomplete="username" required oninput="mascaraIdentificador(this)">
        </div>
        <div class="auth-form-group">
            <label>Senha</label>
            <div style="position:relative;">
                <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required style="padding-right:40px;">
                <button type="button" aria-label="Mostrar senha" aria-pressed="false" onclick="toggleSenha('senha',this)" style="position:absolute;right:0;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:13px;"><svg width="18" height="18" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </div>
        <button type="submit" class="btn-entrar btn-primario">Entrar</button>
    </form>

    <div class="link-cadastro">
        <a href="#" class="link-secundario" onclick="mostrarRecuperacao(event)">Esqueci minha senha</a>
    </div>

    <div class="link-cadastro">
        Ainda não tem cadastro? <a href="cadastro.html">Cadastre-se</a>
    </div>
</div>

<div class="auth-container" id="containerEscolherBateria" style="display:none;">
    <div class="logo">
        <div class="simbolo-marca"><div class="big"></div><div class="small"></div></div>
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
        <p>Qual bateria você quer ver?</p>
    </div>
    <div id="listaBaterias"></div>
    <!-- Sem isso, quem chega aqui só conseguia sair entrando numa bateria
         primeiro pra achar o botão "Sair" na tela seguinte — uma tela de
         decisão intermediária sempre precisa de uma saída própria (pedido
         da Márcia, 17/jul/2026, avaliado como UX). -->
    <div class="link-cadastro">
        <a href="#" class="link-secundario" onclick="sairDeEscolherBateria(event)">Sair</a>
    </div>
</div>

<div class="auth-container" id="containerRecuperacao" style="display:none;">
    <div class="logo">
        <div class="simbolo-marca"><div class="big"></div><div class="small"></div></div>
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
        <p>Recuperar senha</p>
    </div>

    <div id="mensagemRecuperacao" class="mensagem"></div>

    <form id="formRecuperacao">
        <div class="auth-form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificadorRecuperacao" placeholder="000.000.000-00 ou seu@email.com" required oninput="mascaraIdentificador(this)">
        </div>
        <button type="submit" class="btn-entrar btn-primario">Enviar link de recuperação</button>
    </form>

    <div class="link-cadastro">
        <a href="#" onclick="mostrarRecuperacao(event)">Voltar ao login</a>
    </div>
</div>

<!-- Rodapé de suporte — fora do cartão de login de propósito (21/jul/2026,
     pedido da Márcia): antes ficava empilhado junto com os botões
     principais, logo abaixo de "Entrar", dando a impressão de que o sistema
     já esperava dar problema. Continua a um clique de distância, só não
     compete mais com a ação principal da tela. -->
<a href="#" class="rodape-suporte" onclick="return abrirSuporteLogin()">Fale com o suporte</a>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    // Fica só declarado aqui — o script do Supabase agora carrega com
    // "defer" (não trava mais o resto da página enquanto baixa, resolve a
    // tela preta demorada reportada pela Márcia em 15/jul/2026). Isso
    // significa que "window.supabase" só existe depois do DOMContentLoaded
    // — por isso a criação de verdade do cliente (sb = ...) e a checagem
    // de sessão ficam dentro do listener de DOMContentLoaded lá embaixo.
    let sb;

    // Enquanto essa checagem roda, o spinner (#containerCarregando) já está
    // visível por padrão no HTML — só troca pro formulário de login se
    // descobrir que precisa mesmo pedir usuário/senha (sem sessão válida).
    function mostrarFormularioLogin() {
        document.getElementById('containerCarregando').style.display = 'none';
        document.getElementById('containerEscolherBateria').style.display = 'none';
        document.getElementById('containerLogin').style.display = 'block';
    }

    // Guarda cor/nome/logo da escola em localStorage — mesma chave que
    // carteirinha.html já lê (lerConfigCache) — pra ela nascer pronta assim
    // que a gente troca de tela, sem esperar rede nenhuma na própria tela
    // da carteirinha. Roda ainda aqui no login, com o spinner na tela — a
    // Márcia preferiu esperar mais tempo aqui (honesto, "carregando") do que
    // ver a carteirinha aparecer incompleta (15/jul/2026).
    function chaveCacheConfig(bateriaId) {
        return `tumtu_cfg_${bateriaId}`;
    }

    function lerConfigCache(bateriaId) {
        try {
            const raw = localStorage.getItem(chaveCacheConfig(bateriaId));
            return raw ? JSON.parse(raw) : null;
        } catch (e) {
            return null;
        }
    }

    // Pré-decodifica a imagem (não só baixa os bytes) antes de considerar o
    // logo "pronto" — um <img src="..."> com um data URI grande ainda leva um
    // instante pra decodificar/pintar na primeira vez; fazendo isso aqui, de
    // antemão, o navegador já tem o bitmap pronto quando carteirinha.html
    // usar a mesma URL, então pinta na hora, sem "pipocar". Resolve o
    // relato da Márcia (16/jul/2026) de ver o logo errado/antigo por um
    // instante ao trocar de bateria, principalmente no computador.
    async function precarregarImagem(src) {
        if (!src) return;
        try {
            const img = new Image();
            img.src = src;
            if (img.decode) await img.decode();
        } catch (e) {
            // Falha ao pré-carregar não deve travar o fluxo — carteirinha.html tenta de novo sozinha.
        }
    }

    async function prefetchConfigEscola(bateriaId, token) {
        if (!bateriaId) return;
        try {
            const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` };
            const resBateria = await fetch(`${SUPABASE_URL}/rest/v1/baterias?id=eq.${bateriaId}&select=nome,instagram,escola_id,logo_url`, { headers: hdrs });
            const baterias = await resBateria.json();
            const bateria = Array.isArray(baterias) && baterias[0] ? baterias[0] : null;
            if (!bateria || !bateria.escola_id) return;

            const resEscola = await fetch(`${SUPABASE_URL}/rest/v1/escolas?id=eq.${bateria.escola_id}&select=nome,sigla,temporada_atual,cor_primaria,cor_secundaria,cor_terciaria,cor_quaternaria,logo_url`, { headers: hdrs });
            const escolas = await resEscola.json();
            const escola = Array.isArray(escolas) && escolas[0] ? escolas[0] : null;
            if (!escola) return;

            const cfg = {
                nomeEscola: escola.sigla || escola.nome || '',
                nomeBateria: bateria.nome || '',
                instagramBateria: bateria.instagram || '',
                temporadaAtual: escola.temporada_atual || '',
                cores: [escola.cor_primaria, escola.cor_secundaria, escola.cor_terciaria, escola.cor_quaternaria].filter(Boolean),
                corPrimaria: escola.cor_primaria || null,
                corSecundaria: escola.cor_secundaria || null,
                corTerciaria: escola.cor_terciaria || null,
                escolaId: bateria.escola_id,
                logoEscola: escola.logo_url || null,
                logoBateria: bateria.logo_url || null,
            };
            await Promise.all([
                precarregarImagem(cfg.logoEscola),
                precarregarImagem(cfg.logoBateria),
            ]);
            localStorage.setItem(chaveCacheConfig(bateriaId), JSON.stringify(cfg));
        } catch (e) {
            // Sem cache não quebra nada — carteirinha.html ainda busca sozinha se precisar.
        }
    }

    // Busca todos os vínculos da pessoa e decide: entra direto (só 1 vínculo
    // e não é troca forçada) ou mostra a telinha de escolher bateria.
    // Compartilhada entre o login manual e "Trocar de bateria" (reaproveita
    // a sessão já aberta, sem pedir senha de novo).
    async function buscarEEscolherVinculos(pessoaId, forcarEscolha) {
        const { data: todosVinculos } = await sb.from('ritmistas_com_instrumento').select('*').eq('pessoa_id', pessoaId);
        if (!todosVinculos || todosVinculos.length === 0) {
            mostrarMensagem('Você ainda não tem vínculo com nenhuma bateria. Procure seu Mestre ou Diretor pra pedir o link de cadastro.', 'aviso');
            mostrarFormularioLogin();
            return;
        }

        // "Desligado" e "rejeitado" são estados finais, sem volta por ali —
        // nunca aparecem na lista, nem travados (decisão da Márcia, 18/jul/2026:
        // "é ruim oferecer um botão pra um beco sem saída"). "Pendente" e
        // "suspenso" são temporários, então continuam aparecendo, só travados.
        const vinculos = todosVinculos.filter(v => v.status !== 'desligado' && v.status !== 'rejeitado');
        if (vinculos.length === 0) {
            mostrarMensagem('Você não tem nenhum vínculo disponível no momento. Procure a diretoria da sua bateria.', 'aviso');
            mostrarFormularioLogin();
            return;
        }

        // Busca o modo_piloto de cada bateria envolvida e anexa em cada vínculo — usado pra decidir admin.html x carteirinha.html.
        const { data: baterias } = await sb.from('baterias').select('id, nome, modo_piloto').in('id', vinculos.map(v => v.bateria_id));
        const infoPorBateria = Object.fromEntries((baterias || []).map(b => [b.id, b]));
        vinculos.forEach(v => { v.modo_piloto = infoPorBateria[v.bateria_id]?.modo_piloto || false; v.totalVinculos = vinculos.length; });

        if (vinculos.length === 1 && !forcarEscolha) {
            continuarComVinculo(vinculos[0]);
            return;
        }

        // Mais de uma bateria disponível (ou troca forçada) — mostra a telinha de escolha em vez de entrar direto.
        const nomesPorBateria = Object.fromEntries((baterias || []).map(b => [b.id, b.nome]));
        const cargoLabelVinculo = v => v.perfil === 'mestre' ? (v.genero === 'feminino' ? 'Mestra de Bateria' : 'Mestre de Bateria')
            : v.perfil === 'diretor' ? (v.genero === 'feminino' ? 'Diretora' : 'Diretor')
            : 'Ritmista';
        const rotuloStatus = { pendente: 'Pendente', suspenso: 'Suspenso' };

        document.getElementById('listaBaterias').innerHTML = vinculos.map((v, i) => {
            const travado = v.status !== 'aprovado';
            const rotulo = rotuloStatus[v.status] ? ` · ${rotuloStatus[v.status]}` : '';
            return `
            <button type="button" class="btn-secundario" style="width:100%;margin-top:10px;text-align:left;${travado ? 'opacity:0.5;cursor:not-allowed;' : ''}" ${travado ? 'disabled' : `onclick="escolherVinculo(${i})"`}>
                ${nomesPorBateria[v.bateria_id] || 'Bateria'} <span class="label-dica">— ${cargoLabelVinculo(v)}${rotulo}</span>
            </button>`;
        }).join('');
        window.vinculosParaEscolher = vinculos;
        document.getElementById('containerCarregando').style.display = 'none';
        document.getElementById('containerLogin').style.display = 'none';
        document.getElementById('containerEscolherBateria').style.display = 'block';

        // Busca cor/logo de TODAS as baterias listadas, em segundo plano,
        // enquanto a pessoa decide qual escolher — assim, quando ela clicar,
        // o dado já está pronto e não precisa de um segundo spinner (pedido
        // da Márcia em 16/jul/2026: "clica, spinner de novo... isso é
        // sacanagem"). Não precisa esperar (sem await) nem tratar erro aqui
        // — se falhar ou não terminar a tempo, continuarComVinculo() busca
        // de novo do jeito de sempre.
        const { data: { session: sessaoAtual } } = await sb.auth.getSession();
        const bateriasUnicas = [...new Set(vinculos.map(v => v.bateria_id))];
        bateriasUnicas.forEach(bateriaId => {
            prefetchConfigEscola(bateriaId, sessaoAtual ? sessaoAtual.access_token : null);
        });
    }

    async function tentarSessaoExistente() {
        const params = new URLSearchParams(window.location.search);
        const forcarTroca = params.get('trocar') === '1';

        const cache = JSON.parse(localStorage.getItem('ritmista') || 'null');
        if (!cache) { mostrarFormularioLogin(); return; }

        const { data: { session } } = await sb.auth.getSession();
        if (!session) { localStorage.removeItem('ritmista'); mostrarFormularioLogin(); return; }

        if (cache.super_admin) {
            window.location.href = 'super-admin.html';
            return;
        }

        // Sessão salva antes do recurso "Trocar de Bateria" existir não tem
        // totalVinculos guardado — busca de novo (com telinha de escolha se
        // for o caso) pra se auto-corrigir, sem precisar deslogar.
        if (forcarTroca || cache.totalVinculos === undefined) {
            await buscarEEscolherVinculos(cache.pessoa_id, forcarTroca);
            return;
        }

        // O status E o cargo salvos no celular podem estar desatualizados (a
        // pessoa pode ter sido suspensa/desligada, ou trocado de cargo pelo
        // Super Admin, desde o último login neste aparelho) — nunca confiar
        // cegamente no cache pra decidir acesso. Reconfere rápido (consulta
        // pequena) antes de liberar pelo atalho.
        const { data: vinculoAtual } = await sb.from('vinculos').select('status, perfil')
            .eq('pessoa_id', cache.pessoa_id).eq('bateria_id', cache.bateria_id).maybeSingle();
        if (!vinculoAtual || vinculoAtual.status !== 'aprovado' || vinculoAtual.perfil !== cache.perfil) {
            await buscarEEscolherVinculos(cache.pessoa_id, false);
            return;
        }

        const isAdmin = cache.perfil === 'mestre' || cache.perfil === 'diretor';
        if (isAdmin && !cache.modo_piloto) {
            window.location.href = 'admin.html';
            return;
        }
        await prefetchConfigEscola(cache.bateria_id, session.access_token);
        window.location.href = 'carteirinha.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        tentarSessaoExistente();
    });

    const ICONE_OLHO_ABERTO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    const ICONE_OLHO_FECHADO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function toggleSenha(id, btn) {
        const input = document.getElementById(id);
        const visivel = input.type === 'text';
        input.type = visivel ? 'password' : 'text';
        btn.setAttribute('aria-pressed', String(!visivel));
        btn.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
        btn.innerHTML = (visivel ? ICONE_OLHO_ABERTO : ICONE_OLHO_FECHADO).replace('<svg', '<svg aria-hidden="true"');
    }

    // Ao focar um campo, rola até ele ficar confortavelmente visível — evita
    // o teclado do celular cobrir o campo recém-tocado (16/jul/2026). Corrigido
    // em 20/jul/2026: só rola quando o campo está perto da borda de baixo ou
    // fora da tela — no desktop (sem teclado virtual) isso quase nunca
    // acontece, então parou de "sambar" a cada clique/Tab.
    document.addEventListener('focusin', (e) => {
        if (e.target.matches('input, select, textarea')) {
            setTimeout(() => {
                const retangulo = e.target.getBoundingClientRect();
                const precisaRolar = retangulo.bottom > window.innerHeight * 0.6 || retangulo.top < 0;
                if (precisaRolar) {
                    e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }
    });

    function mascaraIdentificador(input) {
        const v = input.value;
        if (/[a-zA-Z@]/.test(v)) return;
        let n = v.replace(/\D/g, '');
        if (n.length > 11) n = n.slice(0, 11);
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = n;
    }

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
        // Suporte só entra em cena junto de um erro de verdade — ver nota
        // na CSS de .rodape-suporte.
        const rodapeSuporte = document.querySelector('.rodape-suporte');
        if (rodapeSuporte) rodapeSuporte.classList.toggle('visivel', tipo === 'erro');
    }

    // Número de suporte (config-suporte.js) ainda não preenchido pela Márcia
    // em produção — enquanto estiver vazio, avisa em vez de abrir link quebrado.
    function abrirSuporteLogin() {
        const link = typeof linkSuporteEmail === 'function' ? linkSuporteEmail('Ajuda com o TumTu') : null;
        if (link) {
            window.location.href = link;
        } else {
            mostrarMensagem('O suporte ainda está sendo configurado — volte em breve.', 'aviso');
        }
        return false;
    }

    async function continuarComVinculo(vinculo) {
        const perfil = vinculo.perfil || 'ritmista';
        const isAdmin = perfil === 'mestre' || perfil === 'diretor';

        if (vinculo.status === 'pendente') {
            mostrarFormularioLogin();
            mostrarMensagem(isAdmin
                ? 'Seu cadastro está em análise. Você poderá acessar o painel assim que for aprovado.'
                : 'Seu cadastro ainda está aguardando aprovação da diretoria.', 'aviso');
            return;
        }
        if (vinculo.status === 'rejeitado') {
            mostrarFormularioLogin();
            mostrarMensagem(isAdmin
                ? 'Seu cadastro não foi aprovado. Entre em contato com o suporte do TumTu.'
                : 'Seu cadastro não foi aprovado. Entre em contato com a diretoria.', 'erro');
            return;
        }
        if (vinculo.status === 'suspenso') {
            mostrarFormularioLogin();
            mostrarMensagem(isAdmin
                ? 'Seu acesso está suspenso. Entre em contato com o suporte do TumTu.'
                : 'Seu acesso está suspenso. Entre em contato com a diretoria.', 'erro');
            return;
        }
        if (vinculo.status === 'desligado') {
            mostrarFormularioLogin();
            mostrarMensagem(isAdmin
                ? 'Você foi desligado desta bateria. Entre em contato com o suporte do TumTu.'
                : 'Você foi desligado desta bateria. Entre em contato com a diretoria.', 'erro');
            return;
        }
        // Nega por padrão: só "aprovado" segue em frente. Qualquer status que
        // não seja um dos tratados acima (inclusive um valor novo que apareça
        // no futuro) fica bloqueado, em vez de liberar acesso por engano.
        if (vinculo.status !== 'aprovado') {
            mostrarFormularioLogin();
            mostrarMensagem('Seu acesso não está disponível no momento. Entre em contato com a diretoria.', 'erro');
            return;
        }

        localStorage.setItem('ritmista', JSON.stringify(vinculo));

        if (isAdmin && !vinculo.modo_piloto) {
            window.location.href = 'admin.html';
            return;
        }

        // Vai pra carteirinha. Se a cor/logo dessa bateria já foi buscada em
        // segundo plano enquanto a pessoa estava na telinha de escolher
        // (ver buscarEEscolherVinculos), o cache já está pronto — troca de
        // tela na hora, sem spinner novo. Só mostra o spinner de novo se
        // esse cache ainda não tiver chegado a tempo (raro).
        if (lerConfigCache(vinculo.bateria_id)) {
            window.location.href = 'carteirinha.html';
            return;
        }
        document.getElementById('containerLogin').style.display = 'none';
        document.getElementById('containerEscolherBateria').style.display = 'none';
        document.getElementById('containerCarregando').style.display = 'flex';
        const { data: { session } } = await sb.auth.getSession();
        await prefetchConfigEscola(vinculo.bateria_id, session ? session.access_token : null);
        window.location.href = 'carteirinha.html';
    }

    function escolherVinculo(indice) {
        continuarComVinculo(window.vinculosParaEscolher[indice]);
    }

    async function sairDeEscolherBateria(e) {
        e.preventDefault();
        await sb.auth.signOut();
        localStorage.removeItem('ritmista');
        window.location.reload();
    }

    function mostrarRecuperacao(e) {
        e.preventDefault();
        const login = document.getElementById('containerLogin');
        const recuperacao = document.getElementById('containerRecuperacao');
        const abrindo = recuperacao.style.display === 'none';
        login.style.display = abrindo ? 'none' : 'block';
        recuperacao.style.display = abrindo ? 'block' : 'none';
    }

    document.getElementById('formRecuperacao').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type=submit]');
        const textoOriginal = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Enviando...';
        try {
            const identificador = document.getElementById('identificadorRecuperacao').value.trim();
            const isEmail = identificador.includes('@');

            let authEmail = identificador;
            if (!isEmail) {
                const { data: emailResolvido } = await sb.rpc('resolve_login_email', { identificador });
                authEmail = emailResolvido;
            }

            const mensagemEl = document.getElementById('mensagemRecuperacao');
            // Mensagem sempre igual, exista ou não o cadastro — evita revelar quais CPFs/e-mails estão cadastrados.
            if (authEmail) {
                await sb.auth.resetPasswordForEmail(authEmail, {
                    redirectTo: window.location.origin + '/redefinir-senha.html',
                });
            }
            mensagemEl.textContent = 'Se o CPF ou e-mail existir no sistema, você vai receber um link de recuperação em instantes.';
            mensagemEl.className = 'mensagem aviso';
            mensagemEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = textoOriginal;
        }
    });

    // Uma coisa esperando só, não duas: assim que envia o formulário, troca
    // direto pro spinner (em vez de só desabilitar o botão com "Entrando...")
    // — a pessoa vê uma experiência de carregamento só, do clique até a
    // carteirinha aparecer (pedido da Márcia em 16/jul/2026, "seria só o
    // spinner"). Em caso de erro, volta pro formulário com a mensagem.
    function erroLogin(msg, tipo) {
        mostrarFormularioLogin();
        mostrarMensagem(msg, tipo);
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('containerLogin').style.display = 'none';
        document.getElementById('containerCarregando').style.display = 'flex';

        const identificador = document.getElementById('identificador').value.trim();
        const senha = document.getElementById('senha').value;
        const isEmail = identificador.includes('@');

        let authEmail = identificador;
        if (!isEmail) {
            const { data: emailResolvido, error: erroResolucao } = await sb.rpc('resolve_login_email', { identificador });
            if (erroResolucao || !emailResolvido) {
                erroLogin('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
                return;
            }
            authEmail = emailResolvido;
        }

        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email: authEmail, password: senha });
        if (authError || !authData.user) {
            erroLogin('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }

        // Super Admin não tem vínculo com bateria nenhuma — checa isso primeiro, direto na tabela de pessoas.
        const { data: pessoa } = await sb.from('pessoas').select('id, nome, super_admin').eq('auth_user_id', authData.user.id).maybeSingle();
        if (!pessoa) {
            erroLogin('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }
        if (pessoa.super_admin) {
            localStorage.setItem('ritmista', JSON.stringify({ pessoa_id: pessoa.id, id: pessoa.id, super_admin: true, perfil: 'super_admin', nome: pessoa.nome }));
            window.location.href = 'super-admin.html';
            return;
        }

        await buscarEEscolherVinculos(pessoa.id, false);
    });
</script>
</body>
</html>
