<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TumTu — Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/components.css">
    <script src="config-escola.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            background: #12101a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 { color: #0f172a; font-size: 28px; font-weight: bold; }
        .logo p { color: #666; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .label-dica {
            font-size: 12px;
            font-weight: 400;
            color: #888;
            margin-left: 4px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #D4AF37; }
        .btn-entrar { width: 100%; margin-top: 8px; font-size: 16px; }
        .link-cadastro {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .link-cadastro a { color: #D4AF37; font-weight: bold; text-decoration: none; }
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .mensagem.erro { background: #f8d7da; color: #721c24; }
        .mensagem.aviso { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <form id="formLogin">
        <div class="form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificador" placeholder="000.000.000-00 ou seu@email.com" autocomplete="username" required oninput="mascaraIdentificador(this)">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <div style="position:relative;">
                <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required style="padding-right:40px;">
                <span onclick="toggleSenha('senha',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;user-select:none;">👁</span>
            </div>
        </div>
        <button type="submit" class="btn-entrar btn-primario">Entrar</button>
    </form>

    <div class="link-cadastro">
        <a href="#" onclick="mostrarRecuperacao(event)">Esqueci minha senha</a>
    </div>

    <div class="link-cadastro">
        Ainda não tem cadastro? <a href="index.html">Cadastre-se</a>
    </div>
</div>

<div class="container" id="containerRecuperacao" style="display:none;">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
        <p>Recuperar senha</p>
    </div>

    <div id="mensagemRecuperacao" class="mensagem"></div>

    <form id="formRecuperacao">
        <div class="form-group">
            <label>CPF ou e-mail <span class="label-dica">— use o que você cadastrou</span></label>
            <input type="text" id="identificadorRecuperacao" placeholder="000.000.000-00 ou seu@email.com" required oninput="mascaraIdentificador(this)">
        </div>
        <button type="submit" class="btn-entrar btn-primario">Enviar link de recuperação</button>
    </form>

    <div class="link-cadastro">
        <a href="#" onclick="mostrarRecuperacao(event)">Voltar ao login</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleSenha(id, el) {
        const input = document.getElementById(id);
        const visivel = input.type === 'text';
        input.type = visivel ? 'password' : 'text';
        el.style.opacity = visivel ? '1' : '0.4';
    }

    function mascaraIdentificador(input) {
        const v = input.value;
        if (/[a-zA-Z@]/.test(v)) return;
        let n = v.replace(/\D/g, '');
        if (n.length > 11) n = n.slice(0, 11);
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d)/, '$1.$2');
        n = n.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = n;
    }

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
    }

    function mostrarRecuperacao(e) {
        e.preventDefault();
        const login = document.querySelector('.container:not(#containerRecuperacao)');
        const recuperacao = document.getElementById('containerRecuperacao');
        const abrindo = recuperacao.style.display === 'none';
        login.style.display = abrindo ? 'none' : 'block';
        recuperacao.style.display = abrindo ? 'block' : 'none';
    }

    document.getElementById('formRecuperacao').addEventListener('submit', async (e) => {
        e.preventDefault();
        const identificador = document.getElementById('identificadorRecuperacao').value.trim();
        const isEmail = identificador.includes('@');

        let authEmail = identificador;
        if (!isEmail) {
            const { data: emailResolvido } = await sb.rpc('resolve_login_email', { identificador });
            authEmail = emailResolvido;
        }

        const mensagemEl = document.getElementById('mensagemRecuperacao');
        // Mensagem sempre igual, exista ou não o cadastro — evita revelar quais CPFs/e-mails estão cadastrados.
        if (authEmail) {
            await sb.auth.resetPasswordForEmail(authEmail, {
                redirectTo: window.location.origin + '/redefinir-senha.html',
            });
        }
        mensagemEl.textContent = 'Se o CPF ou e-mail existir no sistema, você vai receber um link de recuperação em instantes.';
        mensagemEl.className = 'mensagem aviso';
        mensagemEl.style.display = 'block';
    });

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();

        const identificador = document.getElementById('identificador').value.trim();
        const senha = document.getElementById('senha').value;
        const isEmail = identificador.includes('@');

        let authEmail = identificador;
        if (!isEmail) {
            const { data: emailResolvido, error: erroResolucao } = await sb.rpc('resolve_login_email', { identificador });
            if (erroResolucao || !emailResolvido) {
                mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
                return;
            }
            authEmail = emailResolvido;
        }

        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email: authEmail, password: senha });
        if (authError || !authData.user) {
            mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }

        const { data: perfilRows } = await sb.from('ritmistas').select('*').eq('auth_user_id', authData.user.id).limit(1);
        if (!perfilRows || perfilRows.length === 0) {
            mostrarMensagem('Dados incorretos. Verifique seu CPF (ou e-mail) e senha.', 'erro');
            return;
        }

        const ritmista = perfilRows[0];
        const perfil = ritmista.perfil || 'ritmista';
        const isAdmin = perfil === 'mestre' || perfil === 'diretor';

        if (!isAdmin && perfil !== 'super_admin') {
            if (ritmista.status === 'pendente') {
                mostrarMensagem('Seu cadastro ainda está aguardando aprovação da diretoria.', 'aviso');
                return;
            }
            if (ritmista.status === 'rejeitado') {
                mostrarMensagem('Seu cadastro foi recusado. Entre em contato com a diretoria.', 'erro');
                return;
            }
        }

        if (isAdmin) {
            if (ritmista.status === 'pendente') {
                mostrarMensagem('Seu cadastro está em análise. Você poderá acessar o painel assim que for aprovado.', 'aviso');
                return;
            }
            if (ritmista.status === 'rejeitado') {
                mostrarMensagem('Seu cadastro foi recusado. Entre em contato com o Super Admin.', 'erro');
                return;
            }
        }

        localStorage.setItem('ritmista', JSON.stringify(ritmista));

        if (isAdmin) {
            window.location.href = 'admin.html';
        } else if (perfil === 'super_admin') {
            window.location.href = 'super-admin.html';
        } else {
            window.location.href = 'carteirinha.html';
        }
    });
</script>
</body>
</html>
