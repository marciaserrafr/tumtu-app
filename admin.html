<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Diretor — Swing da Leopoldina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }

        /* HEADER */
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .header-logo {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; flex-shrink: 0;
            overflow: hidden;
        }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-texto { display: flex; flex-direction: column; gap: 2px; }
        .header-bateria { font-size: 16px; font-weight: bold; line-height: 1.2; }
        .header-escola { font-size: 11px; opacity: 0.55; }
        .header-acoes { display: flex; gap: 12px; align-items: center; }
        .header-usuario { display: flex; align-items: center; gap: 8px; }
        .header-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: #C9A227; color: #1a1a2e;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; flex-shrink: 0;
        }
        .header-user-info { display: flex; flex-direction: column; line-height: 1.2; }
        .header-user-nome { font-size: 13px; font-weight: bold; }
        .header-user-cargo { font-size: 10px; opacity: 0.55; }
        .btn-sair { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .btn-cadastrar-novo { background: #C9A227; border: none; color: #1a1a2e; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* CONTAINER */
        .container { padding: 24px; max-width: 1100px; margin: 0 auto; }

        /* FILTROS */
        .filtros-grupo { margin-bottom: 16px; }
        .filtros-label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-filtro {
            padding: 7px 14px; border-radius: 6px;
            border: 1px solid #ccc; background: white;
            color: #444; cursor: pointer; font-size: 12px;
        }
        .btn-filtro.ativo { background: #1a1a2e; color: white; border-color: #1a1a2e; }
        .btn-filtro.laranja, .btn-filtro.azul, .btn-filtro.verde, .btn-filtro.vermelho { border-color: #ccc; color: #444; }
        .btn-filtro.laranja.ativo, .btn-filtro.azul.ativo, .btn-filtro.verde.ativo, .btn-filtro.vermelho.ativo { background: #1a1a2e; color: white; border-color: #1a1a2e; }

        select.filtro-instrumento {
            padding: 7px 14px; border-radius: 20px;
            border: 2px solid #1a1a2e; background: white;
            color: #1a1a2e; cursor: pointer; font-size: 12px; font-weight: bold;
        }

        /* CONTADOR */
        .contador { font-size: 13px; color: #666; margin-bottom: 16px; }

        /* CARDS */
        .cards { display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 16px;
            border-left: 5px solid #e0e0e0;
        }
        .card.pendente { border-left-color: #ffc107; }
        .card.aprovado { border-left-color: #28a745; }
        .card.suspenso { border-left-color: #fd7e14; }
        .card.desligado { border-left-color: #dc3545; }
        .card.rejeitado { border-left-color: #6c757d; }
        .card.menor-flag { outline: none; }

        .card-info { flex: 1; min-width: 0; }
        .card-topo { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .card-nome { font-size: 16px; font-weight: bold; color: #1a1a2e; }
        .card-apelido { font-size: 12px; color: #999; font-style: italic; margin-bottom: 10px; }

        .card-instrumento {
            display: inline-flex; align-items: center; gap: 6px;
            background: #1a1a2e; color: white;
            padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: bold;
            margin-bottom: 10px;
        }

        .card-dados { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
        .card-dado { font-size: 12px; color: #666; }
        .card-dado strong { color: #333; }

        .badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid; }
        .badge-aprovado { background: #f0faf4; color: #2d7a4f; border-color: #b8ddc8; }
        .badge-rejeitado { background: #f5f5f5; color: #666; border-color: #ddd; }
        .badge-pendente { background: #fffbf0; color: #8a6800; border-color: #ffe69c; }
        .badge-suspenso { background: #fff8f0; color: #9a4e00; border-color: #ffd0a0; }
        .badge-desligado { background: #fff5f5; color: #9a1f1f; border-color: #f5c0c0; }
        .badge-menor { background: #eef3ff; color: #3a5bbf; border-color: #c5d0f0; }

        .motivo-status {
            font-size: 11px; color: #888; font-style: italic;
            margin-top: 4px;
            background: #f8f8f8; padding: 4px 8px; border-radius: 6px;
            display: inline-block;
        }

        /* DECLARAÇÃO MENOR */
        .declaracao-area {
            display: flex; align-items: center; gap: 8px;
            background: #f0f4ff; border: 1px solid #c5d0f0;
            border-radius: 8px; padding: 6px 10px;
            font-size: 12px; color: #555; margin-top: 8px;
        }
        .btn-declaracao { border: 1.5px solid; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; background: transparent; }
        .btn-declaracao.pendente { border-color: #1a1a2e; color: #1a1a2e; }
        .btn-declaracao.entregue { border-color: #2d7a4f; color: #2d7a4f; }

        /* AÇÕES */
        .card-acoes { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }
        .acoes-linha { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .btn-acao {
            border: 1.5px solid; padding: 7px 13px; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-weight: bold;
            background: transparent;
        }
        .btn-aprovar { border-color: #2d7a4f; color: #2d7a4f; }
        .btn-rejeitar { border-color: #999; color: #666; }
        .btn-suspender { border-color: #d4720a; color: #d4720a; }
        .btn-desligar { border-color: #9a1f1f; color: #9a1f1f; }
        .btn-reativar { border-color: #1a1a2e; color: #1a1a2e; }
        .btn-editar-inst { border-color: #1a1a2e; color: #1a1a2e; }

        /* VAZIO */
        .vazio { text-align: center; padding: 40px; color: #999; font-size: 15px; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.aberto { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 28px;
            width: 100%; max-width: 420px; margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 6px; }
        .modal p { font-size: 13px; color: #666; margin-bottom: 16px; }
        .modal label { font-size: 13px; font-weight: bold; color: #333; display: block; margin-bottom: 6px; }
        .modal select, .modal textarea, .modal input {
            width: 100%; padding: 10px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; margin-bottom: 16px;
            font-family: Arial, sans-serif;
        }
        .modal select:focus, .modal textarea:focus { outline: none; border-color: #1a1a2e; }
        .modal-acoes { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-modal-cancelar { background: #f0f0f0; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-modal-confirmar { border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: white; }
        .btn-modal-confirmar.verde { background: #28a745; }
        .btn-modal-confirmar.laranja { background: #fd7e14; }
        .btn-modal-confirmar.vermelho { background: #dc3545; }
        .btn-modal-confirmar.azul { background: #1a1a2e; }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; gap: 8px; }
            .header-bateria { font-size: 14px; }
            .header-escola { font-size: 10px; }
            .header-logo { width: 34px; height: 34px; font-size: 12px; }
            .header-user-info { display: none; }
            .header-avatar { width: 30px; height: 30px; font-size: 11px; }
            .btn-cadastrar-novo { font-size: 12px; padding: 7px 10px; }
            .btn-sair { font-size: 12px; padding: 6px 10px; }

            .container { padding: 16px 12px; }

            .card { flex-direction: column; gap: 12px; padding: 16px; }
            .card-acoes { align-items: flex-start; width: 100%; }
            .acoes-linha { width: 100%; flex-direction: column; }
            .btn-acao { width: 100%; text-align: center; }

            .card-dados { flex-direction: column; gap: 6px; }

            .declaracao-area { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px; min-width:0;">
        <div class="header-logo">
            <img src="logo-swing.png" onerror="this.parentNode.textContent='SL'"/>
        </div>
        <div class="header-texto">
            <div class="header-bateria">Swing da Leopoldina</div>
            <div class="header-escola">Imperatriz Leopoldinense</div>
        </div>
    </div>
    <div class="header-acoes">
        <div class="header-usuario">
            <div class="header-avatar" id="headerAvatar">D</div>
            <div class="header-user-info">
                <div class="header-user-nome" id="headerNome">Diretor</div>
                <div class="header-user-cargo">Diretor Geral</div>
            </div>
        </div>
        <button class="btn-cadastrar-novo" onclick="window.location.href='index.html'">+ Cadastrar</button>
        <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
</div>

<div class="container">

    <div class="filtros-grupo">
        <div class="filtros-label">Filtrar por status</div>
        <div class="filtros">
            <button class="btn-filtro ativo" onclick="filtrarStatus('todos', this)">Todos</button>
            <button class="btn-filtro" onclick="filtrarStatus('pendente', this)">⏳ Pendentes</button>
            <button class="btn-filtro verde" onclick="filtrarStatus('aprovado', this)">✓ Aprovados</button>
            <button class="btn-filtro vermelho" onclick="filtrarStatus('rejeitado', this)">✗ Rejeitados</button>
            <button class="btn-filtro laranja" onclick="filtrarStatus('suspenso', this)">⏸ Suspensos</button>
            <button class="btn-filtro vermelho" onclick="filtrarStatus('desligado', this)">⊘ Desligados</button>
            <button class="btn-filtro azul" onclick="filtrarStatus('menor', this)">⚠️ Menores</button>
        </div>
    </div>

    <div class="filtros-grupo">
        <div class="filtros-label">Filtrar por instrumento</div>
        <div class="filtros">
            <select class="filtro-instrumento" id="filtroInstrumento" onchange="aplicarFiltros()">
                <option value="">Todos os instrumentos</option>
                <option>Caixa</option>
                <option>Chocalho</option>
                <option>Cuíca</option>
                <option>Repique</option>
                <option>Surdo de Primeira</option>
                <option>Surdo de Segunda</option>
                <option>Surdo de Terceira</option>
                <option>Tamborim</option>
            </select>
        </div>
    </div>

    <div class="contador" id="contador"></div>
    <div class="cards" id="listaRitmistas">
        <div class="vazio">Carregando...</div>
    </div>

</div>

<!-- MODAL SUSPENDER -->
<div class="modal-overlay" id="modalSuspender">
    <div class="modal">
        <h2>⏸ Suspender Ritmista</h2>
        <p id="modalSuspenderNome"></p>
        <label>Motivo (opcional)</label>
        <textarea id="motivoSuspensao" rows="3" placeholder="Ex: lesão, problemas pessoais..."></textarea>
        <div class="modal-acoes">
            <button class="btn-modal-cancelar" onclick="fecharModal('modalSuspender')">Cancelar</button>
            <button class="btn-modal-confirmar laranja" onclick="confirmarSuspender()">Suspender</button>
        </div>
    </div>
</div>

<!-- MODAL DESLIGAR -->
<div class="modal-overlay" id="modalDesligar">
    <div class="modal">
        <h2>⊘ Desligar Ritmista</h2>
        <p id="modalDesligarNome"></p>
        <label>Motivo (opcional)</label>
        <textarea id="motivoDesligamento" rows="3" placeholder="Ex: comportamento inadequado, desistência..."></textarea>
        <div class="modal-acoes">
            <button class="btn-modal-cancelar" onclick="fecharModal('modalDesligar')">Cancelar</button>
            <button class="btn-modal-confirmar vermelho" onclick="confirmarDesligar()">Desligar</button>
        </div>
    </div>
</div>

<!-- MODAL EDITAR INSTRUMENTO -->
<div class="modal-overlay" id="modalInstrumento">
    <div class="modal">
        <h2>🥁 Editar Instrumento</h2>
        <p id="modalInstrumentoNome"></p>
        <label>Novo instrumento <span style="color:red">*</span></label>
        <select id="novoInstrumento">
            <option value="">Selecione</option>
            <option>Caixa</option>
            <option>Chocalho</option>
            <option>Cuíca</option>
            <option>Repique</option>
            <option>Surdo de Primeira</option>
            <option>Surdo de Segunda</option>
            <option>Surdo de Terceira</option>
            <option>Tamborim</option>
        </select>
        <label>Motivo da mudança (opcional)</label>
        <textarea id="motivoInstrumento" rows="2" placeholder="Ex: remanejamento de naipe, pedido do ritmista..."></textarea>
        <div class="modal-acoes">
            <button class="btn-modal-cancelar" onclick="fecharModal('modalInstrumento')">Cancelar</button>
            <button class="btn-modal-confirmar azul" onclick="confirmarInstrumento()">Salvar</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';

    let todosRitmistas = [];
    let filtroStatusAtual = 'todos';
    let acaoAtualId = null;

    function calcularIdade(nascimento) {
        if (!nascimento) return null;
        const hoje = new Date();
        const nasc = new Date(nascimento);
        let idade = hoje.getFullYear() - nasc.getFullYear();
        const m = hoje.getMonth() - nasc.getMonth();
        if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
        return idade;
    }

    async function carregarRitmistas() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?select=*&order=created_at.desc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        todosRitmistas = await res.json();
        aplicarFiltros();
    }

    function filtrarStatus(status, btn) {
        filtroStatusAtual = status;
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        aplicarFiltros();
    }

    function aplicarFiltros() {
        const instrumento = document.getElementById('filtroInstrumento').value;
        let lista = todosRitmistas;

        if (filtroStatusAtual === 'menor') {
            lista = lista.filter(r => { const i = calcularIdade(r.nascimento); return i !== null && i < 18; });
        } else if (filtroStatusAtual !== 'todos') {
            lista = lista.filter(r => r.status === filtroStatusAtual);
        }

        if (instrumento) lista = lista.filter(r => r.instrumento === instrumento);

        renderizar(lista);
    }

    function renderizar(lista) {
        const container = document.getElementById('listaRitmistas');
        document.getElementById('contador').textContent = `${lista.length} ritmista(s) encontrado(s)`;

        if (lista.length === 0) {
            container.innerHTML = '<div class="vazio">Nenhum ritmista encontrado.</div>';
            return;
        }

        container.innerHTML = lista.map(r => {
            const idade = calcularIdade(r.nascimento);
            const menor = idade !== null && idade < 18;
            const declaracaoEntregue = r.declaracao_responsavel;
            const status = r.status || 'pendente';

            let botoesAcao = '';
            if (status === 'pendente') {
                botoesAcao = `
                    <button class="btn-acao btn-aprovar" onclick="atualizarStatus(${r.id}, 'aprovado')">✓ Aprovar</button>
                    <button class="btn-acao btn-rejeitar" onclick="atualizarStatus(${r.id}, 'rejeitado')">✗ Rejeitar</button>`;
            } else if (status === 'aprovado') {
                botoesAcao = `
                    <button class="btn-acao btn-editar-inst" onclick="abrirModalInstrumento(${r.id}, '${r.nome}', '${r.instrumento || ''}')">✎ Instrumento</button>
                    <button class="btn-acao btn-suspender" onclick="abrirModalSuspender(${r.id}, '${r.nome}')">⏸ Suspender</button>
                    <button class="btn-acao btn-desligar" onclick="abrirModalDesligar(${r.id}, '${r.nome}')">⊘ Desligar</button>`;
            } else if (status === 'suspenso') {
                botoesAcao = `
                    <button class="btn-acao btn-reativar" onclick="atualizarStatus(${r.id}, 'aprovado')">↩ Reativar</button>
                    <button class="btn-acao btn-desligar" onclick="abrirModalDesligar(${r.id}, '${r.nome}')">⊘ Desligar</button>`;
            } else {
                botoesAcao = `<button class="btn-acao btn-reativar" onclick="atualizarStatus(${r.id}, 'aprovado')">↩ Reativar</button>`;
            }

            const badgeStatus = {
                pendente: '<span class="badge badge-pendente">⏳ PENDENTE</span>',
                aprovado: '<span class="badge badge-aprovado">✓ APROVADO</span>',
                suspenso: '<span class="badge badge-suspenso">⏸ SUSPENSO</span>',
                desligado: '<span class="badge badge-desligado">⊘ DESLIGADO</span>',
                rejeitado: '<span class="badge badge-rejeitado">✗ REJEITADO</span>',
            }[status] || '';

            return `
            <div class="card ${status} ${menor ? 'menor-flag' : ''}">
                <div class="card-info">
                    <div class="card-topo">
                        <span class="card-nome">${r.nome}</span>
                        ${badgeStatus}
                        ${menor ? `<span class="badge badge-menor">⚠️ Menor · ${idade} anos</span>` : ''}
                    </div>
                    ${r.apelido ? `<div class="card-apelido">"${r.apelido}"</div>` : ''}
                    <div class="card-instrumento">🥁 ${r.instrumento || '—'}</div>
                    ${r.motivo_status ? `<div class="motivo-status">Motivo: ${r.motivo_status}</div>` : ''}
                    <div class="card-dados">
                        <div class="card-dado"><strong>CPF:</strong> ${r.cpf || '-'}</div>
                        <div class="card-dado"><strong>Celular:</strong> ${r.celular || '-'}</div>
                        <div class="card-dado"><strong>Cidade:</strong> ${r.cidade || '-'} / ${r.estado || '-'}</div>
                        <div class="card-dado"><strong>Cadastro:</strong> ${new Date(r.created_at).toLocaleDateString('pt-BR')}</div>
                    </div>
                    ${menor ? `
                    <div class="declaracao-area">
                        <span>📄 Declaração do responsável:</span>
                        ${declaracaoEntregue
                            ? `<span style="color:#28a745;font-weight:bold;">✓ Entregue</span>
                               <button class="btn-declaracao entregue" onclick="alternarDeclaracao(${r.id}, false)">Desfazer</button>`
                            : `<span style="color:#dc3545;font-weight:bold;">✗ Pendente</span>
                               <button class="btn-declaracao pendente" onclick="alternarDeclaracao(${r.id}, true)">Marcar como entregue</button>`
                        }
                    </div>` : ''}
                </div>
                <div class="card-acoes">
                    <div class="acoes-linha">${botoesAcao}</div>
                </div>
            </div>`;
        }).join('');
    }

    async function atualizarStatus(id, status, motivo = null) {
        const body = { status };
        if (motivo !== null) body.motivo_status = motivo;
        if (status === 'aprovado') body.motivo_status = null;
        await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
            body: JSON.stringify(body)
        });
        await carregarRitmistas();
    }

    async function alternarDeclaracao(id, entregue) {
        await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
            body: JSON.stringify({ declaracao_responsavel: entregue })
        });
        await carregarRitmistas();
    }

    // MODAIS
    function abrirModalSuspender(id, nome) {
        acaoAtualId = id;
        document.getElementById('modalSuspenderNome').textContent = `Ritmista: ${nome}`;
        document.getElementById('motivoSuspensao').value = '';
        document.getElementById('modalSuspender').classList.add('aberto');
    }
    function confirmarSuspender() {
        const motivo = document.getElementById('motivoSuspensao').value.trim() || null;
        fecharModal('modalSuspender');
        atualizarStatus(acaoAtualId, 'suspenso', motivo);
    }

    function abrirModalDesligar(id, nome) {
        acaoAtualId = id;
        document.getElementById('modalDesligarNome').textContent = `Ritmista: ${nome}`;
        document.getElementById('motivoDesligamento').value = '';
        document.getElementById('modalDesligar').classList.add('aberto');
    }
    function confirmarDesligar() {
        const motivo = document.getElementById('motivoDesligamento').value.trim() || null;
        fecharModal('modalDesligar');
        atualizarStatus(acaoAtualId, 'desligado', motivo);
    }

    function abrirModalInstrumento(id, nome, instrumentoAtual) {
        acaoAtualId = id;
        document.getElementById('modalInstrumentoNome').textContent = `Ritmista: ${nome} · Instrumento atual: ${instrumentoAtual || '—'}`;
        document.getElementById('novoInstrumento').value = '';
        document.getElementById('motivoInstrumento').value = '';
        document.getElementById('modalInstrumento').classList.add('aberto');
    }
    async function confirmarInstrumento() {
        const novo = document.getElementById('novoInstrumento').value;
        if (!novo) { alert('Selecione o novo instrumento.'); return; }
        const motivo = document.getElementById('motivoInstrumento').value.trim() || null;
        fecharModal('modalInstrumento');
        await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${acaoAtualId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
            body: JSON.stringify({ instrumento: novo, motivo_instrumento: motivo })
        });
        await carregarRitmistas();
    }

    function fecharModal(id) {
        document.getElementById(id).classList.remove('aberto');
    }

    // Fechar modal clicando fora
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('aberto'); });
    });

    function sair() { window.location.href = 'login.html'; }

    function iniciarUsuario() {
        const diretor = JSON.parse(localStorage.getItem('diretor') || 'null');
        const nome = diretor?.nome || 'Diretor';
        const iniciais = nome.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
        document.getElementById('headerNome').textContent = nome;
        document.getElementById('headerAvatar').textContent = iniciais;
    }

    iniciarUsuario();
    carregarRitmistas();
</script>
</body>
</html>
