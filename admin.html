<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmistas - Painel Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header span { font-size: 13px; opacity: 0.7; }
        .btn-sair {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .container { padding: 24px; max-width: 1000px; margin: 0 auto; }
        .titulo-secao {
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1a1a2e;
        }
        .cards { display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .card-info { flex: 1; }
        .card-nome {
            font-size: 16px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .card-apelido {
            font-size: 13px;
            color: #999;
            font-style: italic;
            margin-bottom: 8px;
        }
        .card-dados {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .card-dado {
            font-size: 12px;
            color: #666;
        }
        .card-dado strong { color: #333; }
        .card-acoes { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-aprovar {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .btn-rejeitar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-aprovado { background: #d4edda; color: #155724; }
        .badge-rejeitado { background: #f8d7da; color: #721c24; }
        .badge-pendente { background: #fff3cd; color: #856404; }
        .filtros {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-filtro {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #1a1a2e;
            background: transparent;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .btn-filtro.ativo {
            background: #1a1a2e;
            color: white;
        }
        .vazio {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }
        .contador {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🥁 Painel Administrativo</h1>
        <span>Gestão de Ritmistas</span>
    </div>
    <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="container">

    <div class="filtros">
        <button class="btn-filtro ativo" onclick="filtrar('todos', this)">Todos</button>
        <button class="btn-filtro" onclick="filtrar('pendente', this)">⏳ Pendentes</button>
        <button class="btn-filtro" onclick="filtrar('aprovado', this)">✓ Aprovados</button>
        <button class="btn-filtro" onclick="filtrar('rejeitado', this)">✗ Rejeitados</button>
    </div>

    <div class="titulo-secao">Lista de Ritmistas</div>
    <div class="contador" id="contador"></div>
    <div class="cards" id="listaRitmistas">
        <div class="vazio">Carregando...</div>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';

    let todosRitmistas = [];
    let filtroAtual = 'todos';

    async function carregarRitmistas() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?select=*&order=created_at.desc`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        todosRitmistas = await res.json();
        renderizar(todosRitmistas);
    }

    function filtrar(status, btn) {
        filtroAtual = status;
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        const filtrados = status === 'todos' ? todosRitmistas : todosRitmistas.filter(r => r.status === status);
        renderizar(filtrados);
    }

    function renderizar(lista) {
        const container = document.getElementById('listaRitmistas');
        const contador = document.getElementById('contador');
        contador.textContent = `${lista.length} ritmista(s) encontrado(s)`;

        if (lista.length === 0) {
            container.innerHTML = '<div class="vazio">Nenhum ritmista encontrado.</div>';
            return;
        }

        container.innerHTML = lista.map(r => `
            <div class="card">
                <div class="card-info">
                    <div class="card-nome">${r.nome}</div>
                    ${r.apelido ? `<div class="card-apelido">"${r.apelido}"</div>` : ''}
                    <div class="card-dados">
                        <div class="card-dado"><strong>CPF:</strong> ${r.cpf || '-'}</div>
                        <div class="card-dado"><strong>Celular:</strong> ${r.celular || '-'}</div>
                        <div class="card-dado"><strong>Cidade:</strong> ${r.cidade || '-'} / ${r.estado || '-'}</div>
                        <div class="card-dado"><strong>Cadastro:</strong> ${new Date(r.created_at).toLocaleDateString('pt-BR')}</div>
                    </div>
                </div>
                <div class="card-acoes">
                    ${r.status === 'pendente' ? `
                        <button class="btn-aprovar" onclick="atualizarStatus(${r.id}, 'aprovado')">✓ Aprovar</button>
                        <button class="btn-rejeitar" onclick="atualizarStatus(${r.id}, 'rejeitado')">✗ Rejeitar</button>
                    ` : `
                        <span class="badge badge-${r.status}">${r.status.toUpperCase()}</span>
                    `}
                </div>
            </div>
        `).join('');
    }

    async function atualizarStatus(id, status) {
        await fetch(`${SUPABASE_URL}/rest/v1/ritmistas?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({ status })
        });
        await carregarRitmistas();
    }

    function sair() {
        window.location.href = 'login.html';
    }

    carregarRitmistas();
</script>
</body>
</html>
