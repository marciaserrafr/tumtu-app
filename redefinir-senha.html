<!DOCTYPE html>
<html lang="pt-BR" data-tema="tumtu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TumTu — Redefinir senha</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12101a">
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TumTu">
    <script src="pwa-register.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css?v=1">
    <link rel="stylesheet" href="styles/components.css?v=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            background: #12101a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .logo { text-align: center; margin-bottom: 8px; }
        .logo p { color: #666; font-size: 14px; margin-top: 8px; text-align: center; margin-bottom: 24px; }
        .btn-confirmar { width: 100%; margin-top: 8px; font-size: 16px; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="logo">
        <h1><span class="tt-logo"><span class="tt-t">T</span>u<span class="tt-m">m</span><span class="tt-t">T</span>u</span></h1>
    </div>
    <p>Escolha sua nova senha</p>

    <div id="mensagem" class="mensagem"></div>

    <form id="formRedefinir">
        <div class="auth-form-group">
            <label>Nova senha</label>
            <div style="position:relative;">
                <input type="password" id="senhaNova" placeholder="Mínimo 6 caracteres" required minlength="6" style="padding-right:40px;">
                <button type="button" aria-label="Mostrar senha" aria-pressed="false" onclick="toggleSenha('senhaNova',this)" style="position:absolute;right:0;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:13px;"><svg width="18" height="18" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </div>
        <div class="auth-form-group">
            <label>Confirmar nova senha</label>
            <div style="position:relative;">
                <input type="password" id="senhaConfirmar" placeholder="Repita a senha" required minlength="6" style="padding-right:40px;">
                <button type="button" aria-label="Mostrar senha" aria-pressed="false" onclick="toggleSenha('senhaConfirmar',this)" style="position:absolute;right:0;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:13px;"><svg width="18" height="18" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </div>
        <button type="submit" class="btn-confirmar btn-primario">Salvar nova senha</button>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
    }

    const ICONE_OLHO_ABERTO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    const ICONE_OLHO_FECHADO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function toggleSenha(id, btn) {
        const input = document.getElementById(id);
        const visivel = input.type === 'text';
        input.type = visivel ? 'password' : 'text';
        btn.setAttribute('aria-pressed', String(!visivel));
        btn.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
        btn.innerHTML = (visivel ? ICONE_OLHO_ABERTO : ICONE_OLHO_FECHADO).replace('<svg', '<svg aria-hidden="true"');
    }

    let sessaoRecuperacaoOk = false;
    sb.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') sessaoRecuperacaoOk = true;
    });

    document.getElementById('formRedefinir').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nova = document.getElementById('senhaNova').value;
        const confirmar = document.getElementById('senhaConfirmar').value;

        if (nova.length < 6) {
            mostrarMensagem('A senha precisa ter no mínimo 6 caracteres.', 'erro');
            return;
        }
        if (nova !== confirmar) {
            mostrarMensagem('As senhas não coincidem.', 'erro');
            return;
        }

        const { error } = await sb.auth.updateUser({ password: nova });
        if (error) {
            mostrarMensagem('Não foi possível redefinir a senha. O link pode ter expirado — peça um novo em "Esqueci minha senha".', 'erro');
            return;
        }

        mostrarMensagem('Senha redefinida com sucesso! Redirecionando para o login...', 'sucesso');
        await sb.auth.signOut();
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    });
</script>
</body>
</html>
