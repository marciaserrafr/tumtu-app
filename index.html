<!DOCTYPE html>
<html lang="pt-BR" data-tema="tutti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutti — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/components.css">
    <script src="config-escola.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            background: #12101a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 640px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .container { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 { color: #0f172a; font-size: 28px; font-weight: bold; }
        .logo p { color: #666; font-size: 14px; margin-top: 4px; }
        .foto-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .foto-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 3px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
        .foto-preview span { color: #999; font-size: 13px; text-align: center; padding: 8px; }
        .btn-foto {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
        }
        .secao {
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #D4AF37;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        label .obrigatorio { color: red; margin-left: 2px; }
        input, select {
            width: 100%;
            padding: 11px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: white;
        }
        input:focus, select:focus { outline: none; border-color: #D4AF37; }
        input.campo-invalido, select.campo-invalido { border-color: #dc3545; background: #fff5f5; }
        .erro-campo { font-size: 12px; color: #dc3545; margin-top: 4px; display: none; }
        .erro-campo.visivel { display: block; }
        .btn-cadastrar { width: 100%; margin-top: 8px; font-size: 16px; }
        .link-login { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .link-login a { color: #D4AF37; font-weight: bold; text-decoration: none; }
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .mensagem.sucesso { background: #d4edda; color: #155724; }
        .mensagem.erro { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>Tu<span style="color:#D4AF37;font-weight:900">TT</span>i</h1>
    </div>

    <div id="convite-banner" style="display:none;background:#fff8e6;border:1.5px solid #D4AF37;border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:#5a5770;text-align:center;">
        Cadastro de <strong id="convite-cargo" style="color:#12101a;"></strong> da bateria <strong id="convite-bateria" style="color:#12101a;"></strong>
    </div>

    <div id="convite-erro-box" style="display:none;background:#fde8e8;border:1.5px solid #f0c4c0;border-radius:10px;padding:20px;text-align:center;color:#b3261e;font-size:14px;font-weight:600;"></div>

    <div id="conteudo-cadastro">
    <div class="foto-area">
        <div class="foto-preview" onclick="document.getElementById('inputFoto').click()">
            <span>Clique para adicionar foto</span>
        </div>
        <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="previewFoto(this)">
        <button class="btn-foto" onclick="document.getElementById('inputFoto').click()">📷 Escolher foto</button>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <form id="formCadastro" novalidate>

        <div class="secao">Dados Pessoais</div>

        <div class="form-group">
            <label>Nome completo <span class="obrigatorio">*</span></label>
            <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Apelido</label>
                <input type="text" id="apelido" placeholder="Como você é conhecido na bateria">
            </div>
            <div class="form-group">
                <label>Nacionalidade <span class="obrigatorio">*</span></label>
                <select id="nacionalidade_tipo" onchange="toggleNacionalidade()" required>
                    <option value="">Selecione</option>
                    <option value="Brasileira">Brasileira</option>
                    <option value="Estrangeira">Estrangeira</option>
                </select>
                <input type="text" id="nacionalidade" placeholder="Qual é a sua nacionalidade?" style="display:none; margin-top:8px;">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>CPF <span id="cpf-asterisco" class="obrigatorio">*</span></label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" required>
                <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="sem_cpf" style="width:15px;height:15px;accent-color:#D4AF37;cursor:pointer;" onchange="toggleSemCpf()">
                    <label for="sem_cpf" style="margin:0;font-size:12px;color:#666;cursor:pointer;font-weight:500;">Não tenho CPF</label>
                </div>
                <div id="bloco-documento" style="display:none; margin-top:10px;">
                    <div class="form-group" style="margin-bottom:10px;">
                        <label>Tipo de documento</label>
                        <select id="tipo_documento">
                            <option value="">Selecione</option>
                            <option>Passaporte</option>
                            <option>RNE</option>
                            <option>CRNM</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Número do documento</label>
                        <input type="text" id="numero_documento" placeholder="Ex: AB123456">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Data de nascimento <span class="obrigatorio">*</span></label>
                <input type="date" id="nascimento" required>
            </div>
        </div>
        <div class="form-group">
            <label>Celular <span class="obrigatorio">*</span></label>
            <input type="text" id="celular" placeholder="(21) 99999-9999" maxlength="15" oninput="mascaraCelular(this)" required>
        </div>
        <div class="form-group">
            <label>E-mail <span class="obrigatorio">*</span></label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Instrumento <span class="obrigatorio">*</span></label>
                <select id="instrumento" required>
                    <option value="">Selecione</option>
                    <option>Agogô</option>
                    <option>Caixa</option>
                    <option>Chocalho</option>
                    <option>Cuíca</option>
                    <option>Reco-reco</option>
                    <option>Repique</option>
                    <option>Surdo</option>
                    <option>Tamborim</option>
                </select>
            </div>
            <div class="form-group">
                <label>Membro desde</label>
                <select id="membro_desde">
                    <option value="">Selecione o ano</option>
                </select>
            </div>
        </div>

        <div class="secao">Endereço</div>

        <div class="form-group">
            <label>Endereço <span class="obrigatorio">*</span></label>
            <input type="text" id="endereco" placeholder="Rua, Avenida..." required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Número <span class="obrigatorio">*</span></label>
                <input type="text" id="numero" placeholder="Nº" required>
            </div>
            <div class="form-group">
                <label>Complemento</label>
                <input type="text" id="complemento" placeholder="Apto, Bloco...">
            </div>
        </div>
        <div class="form-group">
            <label>Bairro</label>
            <input type="text" id="bairro" placeholder="Bairro">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Cidade <span class="obrigatorio">*</span></label>
                <input type="text" id="cidade" placeholder="Cidade" required>
            </div>
            <div class="form-group">
                <label>Estado <span class="obrigatorio">*</span></label>
                <select id="estado" required onchange="mostrarOutro('estado')">
                    <option value="">Selecione</option>
                    <option>AC</option><option>AL</option><option>AP</option>
                    <option>AM</option><option>BA</option><option>CE</option>
                    <option>DF</option><option>ES</option><option>GO</option>
                    <option>MA</option><option>MT</option><option>MS</option>
                    <option>MG</option><option>PA</option><option>PB</option>
                    <option>PR</option><option>PE</option><option>PI</option>
                    <option>RJ</option><option>RN</option><option>RS</option>
                    <option>RO</option><option>RR</option><option>SC</option>
                    <option>SP</option><option>SE</option><option>TO</option>
                    <option value="Outro">Outro</option>
                </select>
                <input type="text" id="estado_outro" placeholder="Digite o estado/província" style="display:none; margin-top:8px;">
            </div>
        </div>
        <div class="form-group">
            <label>País <span class="obrigatorio">*</span></label>
            <input type="text" id="pais" placeholder="Ex: Brasil, Portugal, Argentina..." value="Brasil" required>
        </div>

        <div class="secao">Medidas</div>

        <div class="form-row">
            <div class="form-group">
                <label>Tamanho da camisa <span class="obrigatorio">*</span></label>
                <select id="tamanho_camisa" required onchange="mostrarOutro('tamanho_camisa')">
                    <option value="">Selecione</option>
                    <option>P</option><option>M</option><option>G</option>
                    <option>GG</option><option>XG</option><option>XGG</option>
                    <option>Momo</option><option value="Outro">Outro</option>
                </select>
                <input type="text" id="tamanho_camisa_outro" placeholder="Informe o tamanho" style="display:none; margin-top:8px;">
            </div>
            <div class="form-group">
                <label>Tamanho da fantasia <span class="obrigatorio">*</span></label>
                <select id="tamanho_fantasia" required onchange="mostrarOutro('tamanho_fantasia')">
                    <option value="">Selecione</option>
                    <option>P</option><option>M</option><option>G</option>
                    <option>GG</option><option>XG</option><option>XGG</option>
                    <option>Momo</option><option value="Outro">Outro</option>
                </select>
                <input type="text" id="tamanho_fantasia_outro" placeholder="Informe o tamanho" style="display:none; margin-top:8px;">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Tamanho da calça <span class="obrigatorio">*</span></label>
                <select id="tamanho_calca" required onchange="mostrarOutro('tamanho_calca')">
                    <option value="">Selecione</option>
                    <option>P</option><option>M</option><option>G</option>
                    <option>GG</option><option>XG</option><option>XGG</option>
                    <option>Momo</option><option value="Outro">Outro</option>
                </select>
                <input type="text" id="tamanho_calca_outro" placeholder="Informe o tamanho" style="display:none; margin-top:8px;">
            </div>
            <div class="form-group">
                <label>Tamanho do sapato <span class="obrigatorio">*</span></label>
                <select id="tamanho_sapato" required onchange="mostrarOutro('tamanho_sapato')">
                    <option value="">Selecione</option>
                    <option>33</option><option>34</option><option>35</option>
                    <option>36</option><option>37</option><option>38</option>
                    <option>39</option><option>40</option><option>41</option>
                    <option>42</option><option>43</option><option>44</option>
                    <option>45</option><option>46</option><option>47</option>
                    <option>48</option><option value="Outro">Outro</option>
                </select>
                <input type="text" id="tamanho_sapato_outro" placeholder="Informe o tamanho" style="display:none; margin-top:8px;">
            </div>
        </div>

        <div class="secao">Saúde</div>

        <div class="form-group">
            <label>Tipo sanguíneo</label>
            <select id="tipo_sanguineo">
                <option value="">Não sei / Prefiro não informar</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>
        </div>

        <div class="secao">Contato de Emergência</div>

        <div class="form-group">
            <label>Nome do contato <span class="obrigatorio">*</span></label>
            <input type="text" id="emergencia_nome" placeholder="Nome completo" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Parentesco <span class="obrigatorio">*</span></label>
                <input type="text" id="emergencia_parentesco" placeholder="Ex: mãe, pai, cônjuge" required>
            </div>
            <div class="form-group">
                <label>Celular do contato <span class="obrigatorio">*</span></label>
                <input type="text" id="emergencia_celular" placeholder="(21) 99999-9999" maxlength="15" oninput="mascaraCelular(this)" required>
            </div>
        </div>

        <div class="secao">Acesso</div>

        <div class="form-row">
            <div class="form-group">
                <label>Senha <span class="obrigatorio">*</span></label>
                <div style="position:relative;">
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6" style="padding-right:40px;">
                    <span onclick="toggleSenha('senha',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;user-select:none;">👁</span>
                </div>
            </div>
            <div class="form-group">
                <label>Confirmar senha <span class="obrigatorio">*</span></label>
                <div style="position:relative;">
                    <input type="password" id="confirmar_senha" placeholder="Digite novamente" required style="padding-right:40px;">
                    <span onclick="toggleSenha('confirmar_senha',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;user-select:none;">👁</span>
                </div>
            </div>
        </div>

        <div id="bloco-consentimento" style="display:none; margin-top:6px; margin-bottom:14px; background:#fff8e6; border:1.5px solid #D4AF37; border-radius:10px; padding:12px 14px;">
            <label style="display:flex; align-items:flex-start; gap:8px; font-size:12px; font-weight:500; color:#5a5770; cursor:pointer;">
                <input type="checkbox" id="consentimento_confirmado" style="margin-top:2px; width:15px; height:15px; accent-color:#D4AF37; cursor:pointer;">
                Confirmo que a pessoa cadastrada está ciente deste cadastro e autorizou seus dados serem inseridos no Tutti.
            </label>
        </div>

        <button type="submit" class="btn-cadastrar btn-primario">Enviar cadastro</button>
    </form>
    </div><!-- /conteudo-cadastro -->

    <div class="link-login">
        Já tem cadastro? <a href="login.html">Entrar</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function previewFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.querySelector('.foto-preview');
                preview.innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleSenha(id, el) {
        const input = document.getElementById(id);
        const visivel = input.type === 'text';
        input.type = visivel ? 'password' : 'text';
        el.style.opacity = visivel ? '1' : '0.4';
    }

    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = v;
    }

    // Preenche dropdown de anos (1980 até ano atual)
    (function() {
        const select = document.getElementById('membro_desde');
        const anoAtual = new Date().getFullYear();
        for (let ano = anoAtual; ano >= 1959; ano--) {
            const opt = document.createElement('option');
            opt.value = ano;
            opt.textContent = ano;
            select.appendChild(opt);
        }
    })();

    function mascaraCelular(input) {
        let v = input.value.replace(/\D/g, '');
        v = v.replace(/^(\d{2})(\d)/, '($1) $2');
        v = v.replace(/(\d{5})(\d)/, '$1-$2');
        input.value = v;
    }

    function mostrarOutro(campo) {
        const select = document.getElementById(campo);
        const outro = document.getElementById(campo + '_outro');
        if (select.value === 'Outro') {
            outro.style.display = 'block';
            outro.required = true;
        } else {
            outro.style.display = 'none';
            outro.required = false;
            outro.value = '';
        }
    }

    function valorCampo(campo) {
        const select = document.getElementById(campo);
        if (select.value === 'Outro') {
            return document.getElementById(campo + '_outro').value.trim();
        }
        return select.value;
    }

    function valorTamanho(campo) { return valorCampo(campo); }

    function toggleSemCpf() {
        const semCpf = document.getElementById('sem_cpf').checked;
        const cpfInput = document.getElementById('cpf');
        const blocoDoc = document.getElementById('bloco-documento');
        const tipoDoc = document.getElementById('tipo_documento');
        const numDoc = document.getElementById('numero_documento');
        cpfInput.style.display = semCpf ? 'none' : '';
        cpfInput.value = '';
        cpfInput.required = !semCpf;
        document.getElementById('cpf-asterisco').style.display = semCpf ? 'none' : 'inline';
        blocoDoc.style.display = semCpf ? 'block' : 'none';
        tipoDoc.required = semCpf;
        numDoc.required = semCpf;
    }

    function toggleNacionalidade() {
        const tipo = document.getElementById('nacionalidade_tipo').value;
        const input = document.getElementById('nacionalidade');
        input.style.display = tipo === 'Estrangeira' ? 'block' : 'none';
        input.required = tipo === 'Estrangeira';
        if (tipo === 'Brasileira') input.value = '';
    }


    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        el.style.display = 'block';
    }

    // ── CADASTRO VIA LINK FIXO (?bateria=&cargo=) — Ritmista/Mestre/Diretor ─
    let linkFixoAtual = null;

    async function inicializarLinkFixo() {
        const params = new URLSearchParams(window.location.search);
        const bateriaId = params.get('bateria');
        if (!bateriaId) return;

        const cargoParam = params.get('cargo'); // 'mestre' | 'diretor' | ausente = ritmista
        const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
        const resBat = await fetch(`${SUPABASE_URL}/rest/v1/baterias_publicas?id=eq.${bateriaId}&select=id,nome`, { headers });
        const baterias = resBat.ok ? await resBat.json() : [];
        const bateria = baterias[0];

        if (!bateria) {
            document.getElementById('conteudo-cadastro').style.display = 'none';
            const erroBox = document.getElementById('convite-erro-box');
            erroBox.textContent = 'Link inválido. Peça um novo link à diretoria.';
            erroBox.style.display = 'block';
            return;
        }

        const perfil = cargoParam === 'mestre' ? 'mestre' : cargoParam === 'diretor' ? 'diretor' : 'ritmista';
        linkFixoAtual = { perfil, bateriaId: bateria.id };

        const cargoLabel = perfil === 'mestre' ? 'Mestre de Bateria' : perfil === 'diretor' ? 'Diretor' : 'Ritmista';
        document.getElementById('convite-cargo').textContent = cargoLabel;
        document.getElementById('convite-bateria').textContent = bateria.nome;
        document.getElementById('convite-banner').style.display = 'block';
    }

    // ── CADASTRO MANUAL (?modo=manual) — Super Admin / Mestre / Diretor ─
    let modoManualAtual = null;

    async function inicializarModoManual() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('modo') !== 'manual') return;

        const cargo = params.get('cargo');
        const bateriaId = params.get('bateria_id');
        const usuarioLogado = JSON.parse(localStorage.getItem('ritmista') || 'null');

        const autorizado = !!usuarioLogado && (
            usuarioLogado.perfil === 'super_admin' ||
            (cargo === 'ritmista' && (usuarioLogado.perfil === 'mestre' || usuarioLogado.perfil === 'diretor'))
        );

        if (!bateriaId || !cargo || !autorizado) {
            document.getElementById('conteudo-cadastro').style.display = 'none';
            const erroBox = document.getElementById('convite-erro-box');
            erroBox.textContent = 'Você não tem permissão para acessar este cadastro.';
            erroBox.style.display = 'block';
            return;
        }

        const { data: sessionDataManual } = await sb.auth.getSession();
        const tokenManual = sessionDataManual.session ? sessionDataManual.session.access_token : SUPABASE_KEY;
        const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${tokenManual}` };
        const resBat = await fetch(`${SUPABASE_URL}/rest/v1/baterias?id=eq.${bateriaId}&select=nome`, { headers });
        const baterias = await resBat.json();

        modoManualAtual = { cargo, bateriaId: Number(bateriaId), criadoPorId: usuarioLogado.id };
        const cargoLabel = cargo === 'mestre' ? 'Mestre de Bateria' : cargo === 'diretor' ? 'Diretor' : 'Ritmista';
        document.getElementById('convite-cargo').textContent = cargoLabel;
        document.getElementById('convite-bateria').textContent = baterias[0] ? baterias[0].nome : '';
        document.getElementById('convite-banner').style.display = 'block';
        document.getElementById('bloco-consentimento').style.display = 'block';
    }

    function mostrarErroCampo(campo, mensagem) {
        campo.classList.add('campo-invalido');
        let span = campo.parentNode.querySelector('.erro-inline');
        if (!span) {
            span = document.createElement('span');
            span.className = 'erro-inline';
            span.style.cssText = 'font-size:12px;color:#dc3545;margin-top:4px;display:block;';
            campo.parentNode.appendChild(span);
        }
        span.textContent = mensagem;
        campo.addEventListener('input', () => {
            campo.classList.remove('campo-invalido');
            if (span) span.textContent = '';
        }, { once: true });
    }

    function limparErros() {
        document.querySelectorAll('.erro-inline').forEach(el => el.textContent = '');
        document.querySelectorAll('.campo-invalido').forEach(el => el.classList.remove('campo-invalido'));
    }

    function validarCampos() {
        const obrigatorios = document.querySelectorAll('input[required], select[required]');
        let valido = true;
        let primeiroCampo = null;
        obrigatorios.forEach(campo => {
            if (!campo.value.trim()) {
                mostrarErroCampo(campo, 'Campo obrigatório');
                valido = false;
                if (!primeiroCampo) primeiroCampo = campo;
            }
        });
        if (primeiroCampo) primeiroCampo.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return valido;
    }

    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        limparErros();
        const btnSubmit = document.querySelector('#formCadastro button[type="submit"]') || document.querySelector('button[type="submit"]');
        if (btnSubmit && btnSubmit.disabled) return;
        if (btnSubmit) { btnSubmit.disabled = true; btnSubmit.textContent = 'Enviando...'; }

        const cpf = document.getElementById('cpf').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!validarCampos()) { if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; } return; }
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmar_senha').value;
        if (senha.length < 6) {
            mostrarErroCampo(document.getElementById('senha'), 'A senha deve ter no mínimo 6 caracteres.');
            document.getElementById('senha').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        if (senha !== confirmar) {
            mostrarErroCampo(document.getElementById('confirmar_senha'), 'As senhas não coincidem.');
            document.getElementById('confirmar_senha').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        const dados = {
            nome: document.getElementById('nome').value.trim(),
            apelido: document.getElementById('apelido').value.trim() || null,
            nacionalidade: document.getElementById('nacionalidade_tipo').value === 'Estrangeira'
                ? (document.getElementById('nacionalidade').value.trim() || 'Estrangeira')
                : 'Brasileira',
            cpf: cpf || null,
            tipo_documento: document.getElementById('tipo_documento').value || null,
            numero_documento: document.getElementById('numero_documento').value.trim() || null,
            nascimento: document.getElementById('nascimento').value,
            celular: document.getElementById('celular').value,
            email: email || null,
            instrumento: document.getElementById('instrumento').value,
            endereco: document.getElementById('endereco').value,
            numero: document.getElementById('numero').value,
            complemento: document.getElementById('complemento').value || null,
            bairro: document.getElementById('bairro').value || null,
            cidade: document.getElementById('cidade').value,
            estado: valorCampo('estado'),
            pais: document.getElementById('pais').value.trim() || 'Brasil',
            tamanho_camisa: valorTamanho('tamanho_camisa'),
            tamanho_fantasia: valorTamanho('tamanho_fantasia'),
            tamanho_calca: valorTamanho('tamanho_calca'),
            tamanho_sapato: valorTamanho('tamanho_sapato'),
            membro_desde: document.getElementById('membro_desde').value || null,
            tipo_sanguineo: document.getElementById('tipo_sanguineo').value || null,
            emergencia_nome: document.getElementById('emergencia_nome').value,
            emergencia_parentesco: document.getElementById('emergencia_parentesco').value,
            emergencia_celular: document.getElementById('emergencia_celular').value,
            status: 'pendente'
        };

        if (linkFixoAtual) {
            dados.perfil = linkFixoAtual.perfil;
            dados.bateria_id = linkFixoAtual.bateriaId;
            if (linkFixoAtual.perfil !== 'ritmista') dados.nivel_acesso = 'total';
        }

        // Modo manual (Super Admin/Mestre cadastrando em nome de alguém) passa pela
        // Edge Function admin-create-user, que cria a conta de auth em nome de outra
        // pessoa (precisa de service_role — não dá pra fazer isso do navegador direto).
        if (modoManualAtual) {
            if (!document.getElementById('consentimento_confirmado').checked) {
                mostrarMensagem('Confirme que a pessoa está ciente e autorizou o cadastro antes de enviar.', 'erro');
                document.getElementById('bloco-consentimento').scrollIntoView({ behavior: 'smooth', block: 'center' });
                if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
                return;
            }
            const { data: sessionData } = await sb.auth.getSession();
            const token = sessionData.session ? sessionData.session.access_token : null;
            if (!token) {
                mostrarMensagem('Sessão expirada. Faça login novamente.', 'erro');
                if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
                return;
            }
            dados.senha = senha;
            dados.consentimento_confirmado = true;
            const resFn = await fetch(`${SUPABASE_URL}/functions/v1/admin-create-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ cargo: modoManualAtual.cargo, bateria_id: modoManualAtual.bateriaId, dados })
            });
            const resultado = await resFn.json();
            if (resFn.ok && resultado.ok) {
                mostrarMensagem('Cadastro criado com sucesso! O acesso já está ativo.', 'sucesso');
                document.getElementById('formCadastro').style.display = 'none';
                document.querySelector('.foto-area').style.display = 'none';
                document.getElementById('convite-banner').style.display = 'none';
            } else {
                mostrarMensagem('Erro ao criar cadastro: ' + (resultado.error || 'tente novamente'), 'erro');
                if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
            }
            return;
        }

        // Cadastro público e via link fixo criam conta real no Supabase Auth.
        const { data: authData, error: authError } = await sb.auth.signUp({ email, password: senha });
        if (authError) {
            mostrarMensagem('Erro ao criar acesso: ' + authError.message, 'erro');
            if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
            return;
        }
        dados.auth_user_id = authData.user.id;
        const tokenCadastro = authData.session ? authData.session.access_token : SUPABASE_KEY;

        const res = await fetch(`${SUPABASE_URL}/rest/v1/ritmistas`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${tokenCadastro}`,
                'Prefer': 'return=representation'
            },
            body: JSON.stringify(dados)
        });

        if (res.ok) {
            if (linkFixoAtual && linkFixoAtual.perfil !== 'ritmista') {
                mostrarMensagem('Cadastro enviado! Aguarde a aprovação para acessar o painel.', 'sucesso');
                document.getElementById('formCadastro').style.display = 'none';
                document.querySelector('.foto-area').style.display = 'none';
                document.getElementById('convite-banner').style.display = 'none';
            } else {
                mostrarMensagem('Cadastro enviado com sucesso! Aguarde a aprovação da diretoria.', 'sucesso');
                document.getElementById('formCadastro').reset();
                document.querySelector('.foto-preview').innerHTML = '<span>Clique para adicionar foto</span>';
                if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
            }
        } else {
            mostrarMensagem('Erro ao enviar cadastro. Tente novamente.', 'erro');
            if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Enviar cadastro'; }
        }
    });

    inicializarLinkFixo();
    inicializarModoManual();
</script>
</body>
</html>
