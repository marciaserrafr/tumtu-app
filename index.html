<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TumTu — Gestão de Bateria</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cor-fundo:     #12101a;
      --cor-fundo-med: #1e1b2e;
      --cor-dourado:   #D4AF37;
      --cor-dourado-h: #B8922A;
      --cor-terracota: #7c2d12;
      --cor-branco:    #ffffff;
      --cor-muted:     #8b88a0;
    }

    html, body {
      min-height: 100%;
      background: var(--cor-fundo);
      color: var(--cor-branco);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── fundo animado ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* grade de pontos sutis */
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(212,175,55,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
    }

    /* pulso dourado central */
    .bg::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1;   }
    }

    /* triângulos decorativos — identidade TumTu */
    .tri {
      position: fixed;
      z-index: 0;
      opacity: 0.06;
    }
    .tri-1 {
      bottom: -60px; left: -60px;
      width: 0; height: 0;
      border-right: 320px solid var(--cor-dourado);
      border-top: 320px solid transparent;
    }
    .tri-2 {
      bottom: -30px; left: 60px;
      width: 0; height: 0;
      border-right: 180px solid var(--cor-dourado);
      border-top: 180px solid transparent;
      opacity: 0.04;
    }
    .tri-3 {
      top: -40px; right: -40px;
      width: 0; height: 0;
      border-left: 200px solid var(--cor-dourado);
      border-bottom: 200px solid transparent;
      opacity: 0.03;
    }

    /* ── layout central ── */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      gap: 0;
    }

    /* marca */
    .marca {
      font-size: clamp(52px, 12vw, 96px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: var(--cor-branco);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
    }
    .marca .t { color: var(--cor-dourado); }

    /* risquinho terracota sob o "m" — assinatura discreta */
    .marca .m-wrap {
      position: relative;
      display: inline-block;
    }
    .marca .m-wrap::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 2px;
      background: var(--cor-terracota);
      border-radius: 1px;
    }

    /* slogan */
    .slogan {
      margin-top: 24px;
      font-size: clamp(12px, 2.5vw, 15px);
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cor-muted);
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* divisor */
    .divider {
      margin: 40px auto;
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cor-dourado), transparent);
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* mensagem principal */
    .msg {
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      max-width: 380px;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* badge em breve */
    .badge {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cor-dourado);
      animation: fadeUp 0.8s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    .badge .dot {
      width: 6px; height: 6px;
      background: var(--cor-dourado);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* rodapé discreto */
    .footer {
      position: relative;
      z-index: 1;
      padding: 24px 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 1px;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* mobile */
    @media (max-width: 480px) {
      .marca { letter-spacing: -2px; }
      .tri-1 { border-right-width: 200px; border-top-width: 200px; }
      .tri-2 { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="tri tri-1"></div>
  <div class="tri tri-2"></div>
  <div class="tri tri-3"></div>

  <main class="stage">
    <h1 class="marca">
      <span class="t">T</span>u<span class="m-wrap">m</span><span class="t">T</span>u
    </h1>
    <p class="slogan">Gestão de Bateria</p>

    <div class="divider"></div>

    <p class="msg">
      Uma nova forma de gerir<br>a bateria da sua escola de samba.
    </p>

    <div class="badge">
      <span class="dot"></span>
      Em breve
    </div>
  </main>

  <footer class="footer">tumtu.com.br</footer>

</body>
</html>
